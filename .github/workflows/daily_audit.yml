name: 🕵️ Life Terminal Daily Audit

on:
  push:
    branches: [ "main" ]  # 每次你改代码都会触发
  workflow_dispatch:      # 允许你在页面上手动点按钮触发

jobs:
  run-audit:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v3

      - name: 🐍 Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 🚀 Run Terminal Audit
        run: |
          python main.py
