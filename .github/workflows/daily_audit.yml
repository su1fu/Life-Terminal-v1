name: 生命终端每日审计

on:
  workflow_dispatch:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 运行审计脚本
        run: python main.py  # 这里改成了根目录下的 main.py

      - name: 推送审计结果
        run: |
          git config --global user.name "su1fu-bot"
          git config --global user.email "bot@github.com"
          git add ui/data.json
          git commit -m "chore: 同步审计数据 [skip ci]" || echo "无数据变更"
          git push origin main
