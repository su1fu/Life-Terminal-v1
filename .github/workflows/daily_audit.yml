name: 生命终端每日审计

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 运行审计脚本
        run: python main.py

      - name: 推送审计结果
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add ui/data.json
          git commit -m "自动更新审计数据: $(date)" || echo "无需更新"
          git push
