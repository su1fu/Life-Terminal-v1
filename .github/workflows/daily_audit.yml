name: 生命终端每日审计

on:
  workflow_dispatch:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: 运行审计
        run: python main.py
      - name: 推送数据
        run: |
          git config --global user.name "su1fu-bot"
          git config --global user.email "bot@github.com"
          git add ui/data.json
          git commit -m "chore: push data [skip ci]" || echo "no change"
          git push origin main
