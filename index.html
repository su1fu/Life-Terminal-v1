<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LIFE TERMINAL PRO | 紫微智算</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@200;600&display=swap');
        :root { --gold: #d4af37; --white: #e6e6e6; --bg: #0d0d0d; --danger: #af3a3a; }
        * { box-sizing: border-box; transition: all 0.4s ease; }
        body { background: var(--bg); color: var(--white); font-family: 'Noto Serif SC', serif; margin: 0; display: flex; flex-direction: column; align-items: center; overflow-x: hidden; }
        
        /* 粒子感蒙层 */
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at 50% 50%, rgba(212,175,55,0.05) 0%, transparent 80%); pointer-events: none; }

        .container { width: 95%; max-width: 1200px; padding: 40px 0; z-index: 10; }
        header { text-align: center; margin-bottom: 50px; }
        header h1 { font-size: 32px; letter-spacing: 12px; color: var(--gold); margin: 0; font-weight: 200; }
        header p { font-size: 12px; letter-spacing: 4px; opacity: 0.5; margin-top: 10px; }

        /* 输入面板 */
        .input-panel { display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; background: rgba(255,255,255,0.02); padding: 30px; border: 0.5px solid rgba(212,175,55,0.2); backdrop-filter: blur(10px); }
        .group { display: flex; flex-direction: column; gap: 8px; }
        label { font-size: 11px; color: var(--gold); letter-spacing: 2px; }
        select, input { background: transparent; border: 0.5px solid rgba(255,255,255,0.2); color: white; padding: 10px 20px; font-family: inherit; outline: none; width: 160px; }
        select:focus { border-color: var(--gold); }
        button { background: var(--gold); color: black; border: none; padding: 12px 40px; cursor: pointer; font-weight: bold; letter-spacing: 2px; margin-top: 20px; }
        button:hover { background: white; transform: scale(1.05); }

        /* 动态星盘 */
        .chart-wrapper { display: none; margin-top: 50px; animation: fadeIn 1.5s ease; }
        .chart-grid { display: grid; grid-template-columns: repeat(4, 1fr); grid-template-rows: repeat(4, 1fr); gap: 10px; width: 100%; max-width: 800px; margin: 0 auto; aspect-ratio: 1/1; }
        .cell { border: 0.5px solid rgba(212,175,55,0.1); position: relative; padding: 10px; display: flex; flex-direction: column; justify-content: space-between; background: rgba(255,255,255,0.01); }
        .cell.center { grid-area: 2 / 2 / 4 / 4; display: flex; align-items: center; justify-content: center; border: none; background: radial-gradient(circle, rgba(212,175,55,0.1) 0%, transparent 70%); }
        .palace-name { position: absolute; bottom: 5px; right: 5px; font-size: 10px; opacity: 0.4; }
        .stars { writing-mode: vertical-rl; font-size: 18px; letter-spacing: 4px; }
        .star-main { color: var(--gold); }
        .star-bad { color: var(--danger); }

        /* 解析面板 */
        .analysis-panel { margin-top: 50px; display: none; grid-template-columns: 1fr 1fr; gap: 30px; }
        .card { background: rgba(255,255,255,0.03); border-left: 2px solid var(--gold); padding: 25px; }
        .card h3 { color: var(--gold); margin-top: 0; font-weight: 200; border-bottom: 0.5px solid rgba(212,175,55,0.2); padding-bottom: 10px; }
        .card p { font-size: 14px; line-height: 1.8; opacity: 0.8; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div class="overlay"></div>
    <div class="container">
        <header>
            <h1>生命終端 · 智算</h1>
            <p>LIFE TERMINAL PRO | SYSTEM RELOADED</p>
        </header>

        <div class="input-panel">
            <div class="group"><label>生月</label><select id="month"><option value="3">农历三月</option><option value="1">正月</option><option value="2">二月</option><option value="4">四月</option></select></div>
            <div class="group"><label>生日</label><input type="number" id="day" value="15" min="1" max=30></div>
            <div class="group"><label>时辰</label><select id="hour"><option value="4">午时 (11-13)</option><option value="6">申时 (15-17)</option></select></div>
            <button onclick="renderSystem()">开启推演</button>
        </div>

        <div class="chart-wrapper" id="chart-area">
            <div class="chart-grid" id="grid">
                </div>
        </div>

        <div class="analysis-panel" id="analysis-area">
            <div class="card">
                <h3>大运审计 [十年]</h3>
                <p id="dayun-text"></p>
            </div>
            <div class="card">
                <h3>流年核算 [2026 丙午]</h3>
                <p id="liunian-text"></p>
            </div>
        </div>
    </div>

    <script>
        const palaces = ["巳","午","未","申","辰","中","中","酉","卯","寅","丑","子","亥"]; // 简略布局
        const palaceNames = ["父母", "福德", "田宅", "官禄", "命宫", "", "", "奴仆", "兄弟", "夫妻", "子女", "财帛", "疾厄"];

        function renderSystem() {
            const m = parseInt(document.getElementById('month').value);
            const h = parseInt(document.getElementById('hour').value);
            const d = parseInt(document.getElementById('day').value);

            // 视觉唤醒
            document.getElementById('chart-area').style.display = 'block';
            document.getElementById('analysis-area').style.display = 'grid';

            // 模拟排盘逻辑
            const lifeIdx = (m - 1 - h + 12) % 12;
            const grid = document.getElementById('grid');
            grid.innerHTML = "";

            for(let i=0; i<16; i++) {
                const cell = document.createElement('div');
                cell.className = "cell";
                if(i==5||i==6||i==9||i==10) { 
                    if(i==5) {
                        cell.className = "cell center";
                        cell.innerHTML = `<div><div style="font-size:40px; color:#d4af37">丙午</div><div style="opacity:0.5">2026 流年</div></div>`;
                    } else { cell.style.display="none"; }
                } else {
                    const idx = i > 5 ? i-3 : i; // 简化宫位映射
                    cell.innerHTML = `<span class="palace-name">${palaceNames[idx%12]}</span><div class="stars"><span class="star-main">紫微</span><br><span>七杀</span></div>`;
                    if(palaceNames[idx%12] === "官禄") {
                        cell.innerHTML += `<div class="star-bad" style="font-size:12px; border:1px solid; margin-top:5px; padding:2px;">天机化忌</div>`;
                    }
                }
                grid.appendChild(cell);
            }

            // 专业深度解析
            document.getElementById('dayun-text').innerHTML = `当前大运步入“破局”阶段。出生于农历${m}月${d}日，你的先天命格带有明显的震荡属性。本大运期间，迁移宫位波动剧烈，适合向外求财，忌守旧。`;
            document.getElementById('liunian-text').innerHTML = `2026 丙午年触发<span style="color:#af3a3a; font-weight:bold;">天机化忌</span>直冲官禄宫。这对开发者是极大的考验。天机主逻辑，化忌为阻滞。今年你的所有项目计划都会面临至少三次以上的推倒重来。<b>建议：</b>不要迷恋完美架构，先保证核心逻辑跑通。`;
        }
    </script>
</body>
</html>
