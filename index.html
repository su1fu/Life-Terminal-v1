<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>TERMINAL 9.0 | 交互式生命审计系统</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@200;700&family=JetBrains+Mono:wght@100&display=swap');

        :root {
            --gold: #b08d57; --gold-light: #d4af37; --bg: #080808; 
            --panel: rgba(20, 20, 20, 0.95); --border: #2a2a2a;
        }

        body { 
            background: var(--bg); color: #ccc; font-family: 'Noto Serif SC', serif; 
            margin: 0; display: flex; flex-direction: column; align-items: center; overflow: hidden;
        }

        /* 极简输入区 */
        .header { height: 60px; display: flex; align-items: center; gap: 20px; border-bottom: 1px solid var(--border); width: 100%; justify-content: center; background: #000; }
        select { background: transparent; border: 1px solid var(--border); color: var(--gold); padding: 5px; font-family: 'JetBrains Mono'; }

        /* 命盘主体 */
        .master-layout { display: flex; gap: 30px; padding: 40px; align-items: flex-start; }
        .chart-container { 
            display: grid; grid-template-columns: repeat(4, 200px); grid-template-rows: repeat(4, 200px);
            gap: 2px; background: var(--border); border: 1px solid var(--border); box-shadow: 0 0 50px rgba(0,0,0,1);
        }

        .palace { 
            background: var(--bg); position: relative; padding: 10px; overflow: hidden;
            display: flex; flex-direction: column; transition: 0.3s;
        }
        .palace:hover { background: #111; }

        /* 宫位内精细布局 */
        .p-age { position: absolute; top: 8px; left: 8px; font-family: 'JetBrains Mono'; font-size: 10px; color: #444; }
        .p-gz { position: absolute; bottom: 8px; right: 8px; font-family: 'JetBrains Mono'; font-size: 12px; color: var(--gold); opacity: 0.6; }
        .p-name { position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%); font-weight: 700; color: var(--gold); font-size: 13px; letter-spacing: 2px; }
        
        /* 星曜排布优化 */
        .star-box { display: flex; flex-direction: row-reverse; gap: 6px; margin-top: 25px; }
        .major { writing-mode: vertical-rl; font-size: 18px; font-weight: 700; color: var(--gold-light); letter-spacing: 2px; }
        .minor { writing-mode: vertical-rl; font-size: 11px; color: #777; margin-top: 10px; }
        .sihua { font-size: 9px; padding: 2px; color: #fff; border-radius: 1px; margin-top: 4px; display: inline-block; }
        .ji { background: #600; } .lu { background: #242; }

        /* 中心引擎区 */
        .engine { 
            grid-area: 2 / 2 / 4 / 4; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; border: 1px double var(--gold); background: #000;
        }
        .engine h1 { font-size: 22px; letter-spacing: 8px; color: var(--gold); font-weight: 200; }

        /* 交互按钮 */
        .action-area { margin-top: 30px; display: flex; gap: 20px; }
        .btn { 
            padding: 12px 30px; border: 1px solid var(--gold); color: var(--gold); 
            background: transparent; cursor: pointer; letter-spacing: 2px; transition: 0.4s;
            font-family: 'Noto Serif SC';
        }
        .btn:hover { background: var(--gold); color: #000; box-shadow: 0 0 20px rgba(176,141,87,0.4); }

        /* 全屏分析遮罩 */
        .analysis-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--panel); backdrop-filter: blur(10px);
            display: none; z-index: 100; flex-direction: column; align-items: center; justify-content: center;
            opacity: 0; transition: opacity 0.5s;
        }
        .analysis-content {
            width: 800px; max-height: 80vh; overflow-y: auto; padding: 40px;
            border-left: 1px solid var(--gold); border-right: 1px solid var(--gold);
        }
        .analysis-content h2 { color: var(--gold); font-weight: 200; border-bottom: 1px solid #333; padding-bottom: 20px; }
        .audit-item { margin-bottom: 30px; line-height: 2; color: #aaa; }
        .audit-item b { color: var(--gold-light); }
    </style>
</head>
<body>

    <div class="header">
        <select id="year"><option>丙子 (1996)</option></select>
        <select id="month"><option>六月</option></select>
        <select id="day"><option>初十</option></select>
        <select id="hour"><option>子时</option></select>
    </div>

    <div class="master-layout">
        <div class="chart-container" id="grid">
            <div class="engine">
                <h1>紫微終端</h1>
                <div style="font-family:'JetBrains Mono'; font-size:10px; color:#444; margin-top:10px;">SYSTEM ARCHITECTURE AUDIT</div>
            </div>
            </div>

        <div style="display:flex; flex-direction:column; gap:20px;">
            <div class="action-area">
                <button class="btn" onclick="openAnalysis('full')">命盤全析</button>
                <button class="btn" onclick="openAnalysis('decade')">大限詳析</button>
            </div>
            <div style="border-left: 1px solid #222; padding-left: 20px;">
                <h3 style="color:var(--gold); font-size:14px;">即時監控</h3>
                <p style="font-size:12px; color:#666;">> 核心架構：殺破狼格局</p>
                <p style="font-size:12px; color:#666;">> 資源流转：正常</p>
            </div>
        </div>
    </div>

    <div class="analysis-overlay" id="overlay">
        <div class="analysis-content" id="analysisBody">
            </div>
        <button class="btn" onclick="closeAnalysis()" style="margin-top:20px;">退出審計模式</button>
    </div>

    <script>
        const palaces = ["命宫", "兄弟", "夫妻", "子女", "财帛", "疾厄", "迁移", "奴仆", "官禄", "田宅", "福德", "父母"];
        const layout = ["4/1", "4/2", "4/3", "4/4", "3/4", "2/4", "1/4", "1/3", "1/2", "1/1", "2/1", "3/1"];

        function init() {
            const grid = document.getElementById('grid');
            palaces.forEach((name, i) => {
                const div = document.createElement('div');
                div.className = 'palace';
                div.style.gridArea = layout[i];
                
                // 模拟精细星曜排布
                let stars = `<div class="major">紫微</div><div class="minor">文昌</div>`;
                if(i === 0) stars = `<div class="major">廉貞<span class="sihua ji">忌</span></div><div class="major">七殺</div><div class="minor">擎羊</div>`;
                if(i === 4) stars = `<div class="major">武曲<span class="sihua lu">祿</span></div><div class="major">天府</div><div class="minor">禄存</div>`;

                div.innerHTML = `
                    <div class="p-age">${6+i*10}-${15+i*10}</div>
                    <div class="star-box">${stars}</div>
                    <div class="p-name">${name}</div>
                    <div class="p-gz">丙寅</div>
                `;
                grid.appendChild(div);
            });
        }

        function openAnalysis(type) {
            const overlay = document.getElementById('overlay');
            const body = document.getElementById('analysisBody');
            overlay.style.display = 'flex';
            setTimeout(() => overlay.style.opacity = '1', 10);

            if(type === 'full') {
                body.innerHTML = `
                    <h2>命盤全體系統審計報告</h2>
                    <div class="audit-item">
                        <b>[底層架構分析]</b>：本造屬於典型的「殺破狼」變動格。这意味着你的生命系统天生具有极强的扩张性和容错力，适合在高压、高频更迭的环境下（如初创架构、核心算法攻坚）生存。
                    </div>
                    <div class="audit-item">
                        <b>[資源權限分配]</b>：財帛宮見「武曲化祿」，預示著價值變現能力與技術深度直接掛鉤。你的現金流非被動產生，而是通過不斷優化「個人技術棧」產出的剩餘價值。
                    </div>
                `;
            } else {
                body.innerHTML = `
                    <h2>當前大限 (26-35歲) 詳析</h2>
                    <div class="audit-item">
                        <b>[週期性邏輯衝突]</b>：目前處於十年大限的「破軍」波動期。系統正在經歷底層重構，舊有的方法論可能不再適用。這不是系統故障，而是為了支持更高並發量的「生命版本迭代」。
                    </div>
                `;
            }
        }

        function closeAnalysis() {
            const overlay = document.getElementById('overlay');
            overlay.style.opacity = '0';
            setTimeout(() => overlay.style.display = 'none', 500);
        }

        init();
    </script>
</body>
</html>
