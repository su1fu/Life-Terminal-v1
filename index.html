<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>TERMINAL | 紫微智算核心</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;900&display=swap');
        :root { --gold: #d4af37; --bg: #050505; --text: #e0e0e0; }
        body { background: var(--bg); color: var(--text); font-family: 'Noto Serif SC', serif; margin: 0; display: flex; justify-content: center; overflow-x: hidden; }
        .terminal { width: 95%; max-width: 1000px; padding: 40px 0; }
        
        /* 高级感头部 */
        header { border-bottom: 1px solid var(--gold); padding-bottom: 20px; margin-bottom: 40px; text-align: center; }
        header h1 { letter-spacing: 15px; color: var(--gold); font-size: 32px; margin: 0; }
        .bazi-info { font-size: 14px; color: var(--gold); margin-top: 15px; opacity: 0.8; }

        /* 动态星盘 Grid */
        .ziwei-chart { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; aspect-ratio: 1/1; margin-bottom: 40px; }
        .palace { border: 0.5px solid rgba(212,175,55,0.3); background: rgba(255,255,255,0.02); padding: 15px; position: relative; min-height: 120px; }
        .palace-name { position: absolute; bottom: 8px; right: 8px; font-size: 12px; color: var(--gold); }
        .star-box { writing-mode: vertical-rl; font-size: 18px; letter-spacing: 5px; }
        .star-main { color: var(--gold); font-weight: 900; }
        .star-ji { color: #ff4444; border: 1px solid #ff4444; font-size: 12px; margin-top: 5px; padding: 2px; }

        /* 解析区 */
        .analysis { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; }
        .card { border-left: 3px solid var(--gold); background: rgba(212,175,55,0.05); padding: 25px; }
        .card h3 { color: var(--gold); margin-top: 0; font-weight: 900; }
        
        .loading { position: fixed; top:0; left:0; width:100%; height:100%; background:var(--bg); z-index:100; display:flex; align-items:center; justify-content:center; letter-spacing:5px; color:var(--gold); }
    </style>
</head>
<body>
    <div id="loader" class="loading">CONNECTING TO CORE ENGINE...</div>
    <div class="terminal">
        <header>
            <h1>生命終端 · 智算</h1>
            <div id="bazi-display" class="bazi-info">正在同步八字命盘...</div>
        </header>

        <div class="ziwei-chart" id="chart-grid">
            </div>

        <div class="analysis">
            <div class="card">
                <h3>2026 丙午审计</h3>
                <p id="liunian-text"></p>
            </div>
            <div class="card">
                <h3>大运周期核算</h3>
                <p id="dayun-text"></p>
            </div>
        </div>
    </div>

    <script>
        async function sync() {
            try {
                // 解决 404 的关键：直接读取同目录下的 data.json
                const res = await fetch('data.json'); 
                const data = await res.json();
                
                document.getElementById('bazi-display').innerText = `【八字原型】${data.user_info.bazi} | 命格：${data.user_info.element}`;
                document.getElementById('liunian-text').innerHTML = data.liunian_analysis;
                document.getElementById('dayun-text').innerHTML = data.dayun_analysis;
                
                renderChart(data.palace_data);
                document.getElementById('loader').style.display = 'none';
            } catch (e) {
                document.getElementById('loader').innerText = "链路故障：请先运行 Actions 同步数据";
            }
        }

        function renderChart(palaces) {
            const grid = document.getElementById('chart-grid');
            // 这里可以写更复杂的 12 宫位映射逻辑
            palaces.forEach(p => {
                const div = document.createElement('div');
                div.className = 'palace';
                div.innerHTML = `
                    <div class="star-box">
                        <span class="star-main">${p.stars[0]}</span>
                        ${p.stars[1] ? `<span class="star-ji">${p.stars[1]}</span>` : ''}
                    </div>
                    <span class="palace-name">${p.name}</span>
                `;
                grid.appendChild(div);
            });
        }
        window.onload = sync;
    </script>
</body>
</html>
