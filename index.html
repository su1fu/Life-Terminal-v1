<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>TERMINAL 17.0 | 赛博国风命理终端 v4.1</title>
    <style>
        :root {
            --bg: #050505;
            --gold: #d4af37;
            --gold-dim: rgba(212, 175, 55, 0.2);
            --gold-dark: #332a00;
            --lu-green: #7fbf7f;
            --quan-blue: #4a90e2;
            --ke-white: #e0e0e0;
            --ji-red: #ff0000;
            --border-color: #1a1a1a;
            --panel-bg: rgba(5, 5, 5, 0.9);
        }

        body { background: var(--bg); color: #ccc; font-family: "Microsoft YaHei", sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; overflow-x: hidden; }

        /* --- 1. 顶部交互入口 --- */
        .top-bar {
            width: 100%; padding: 20px; background: rgba(0,0,0,0.9); border-bottom: 1px solid var(--gold-dim);
            display: flex; justify-content: center; gap: 15px; align-items: center; z-index: 100; box-shadow: 0 2px 20px rgba(0,0,0,0.8);
        }
        select {
            background: #111; border: 1px solid var(--gold-dim); color: var(--gold);
            padding: 8px 15px; font-size: 14px; cursor: pointer; outline: none; transition: 0.3s;
        }
        select:focus { border-color: var(--gold); box-shadow: 0 0 10px var(--gold-dim); }
        
        .btn-deploy {
            background: rgba(212, 175, 55, 0.1); border: 1px solid var(--gold); color: var(--gold);
            padding: 8px 25px; font-size: 15px; font-weight: bold; cursor: pointer; transition: all 0.3s;
            box-shadow: inset 0 0 10px rgba(212, 175, 55, 0.2); letter-spacing: 2px;
        }
        .btn-deploy:hover { background: var(--gold); color: #000; box-shadow: 0 0 20px var(--gold); transform: scale(1.05); }
        .btn-deploy:disabled { opacity: 0.5; cursor: not-allowed; filter: grayscale(1); transform: none; box-shadow: none; }

        .layout-container { display: grid; grid-template-columns: 880px 400px; gap: 35px; padding: 40px; position: relative; }

        /* --- 2. 地盘网格 (待机：5-10% 极低透明度) --- */
        .chart-grid {
            display: grid; grid-template-columns: repeat(4, 220px); grid-template-rows: repeat(4, 220px);
            gap: 1px; background: transparent; position: relative; border: 1px solid transparent;
        }
        
        .palace {
            background: rgba(10,10,10,1); position: relative; padding: 15px; box-sizing: border-box;
            border: 1px solid var(--gold-dark); opacity: 0.08; transition: opacity 0.3s ease-out, border-color 0.5s, box-shadow 0.5s;
        }
        .palace-name { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 24px; font-weight: bold; color: var(--gold); opacity: 0.2; letter-spacing: 5px; }
        
        /* 激活后的激光网格 */
        .palace.active { opacity: 1; border-color: var(--gold); box-shadow: inset 0 0 20px rgba(212,175,55,0.15), 0 0 10px rgba(212,175,55,0.2); }

        /* --- 3. 星曜飞布动画 --- */
        @keyframes starLand {
            0% { opacity: 0; transform: translate(-50%, -50%) scale(0.5) translateY(-50px); filter: blur(10px); }
            60% { transform: translate(0, 0) scale(1.2) translateY(0); filter: blur(0); }
            100% { opacity: 1; transform: translate(0, 0) scale(1) translateY(0); text-shadow: 0 0 10px rgba(212, 175, 55, 0.6); }
        }

        .star-container { display: flex; flex-direction: row-reverse; gap: 10px; height: 130px; margin-top: 25px; position: relative; z-index: 2; }
        .m-star { writing-mode: vertical-rl; font-size: 22px; font-weight: bold; color: #eee; letter-spacing: 3px; opacity: 0; position: relative; }
        .m-star.gold { color: var(--gold); }
        
        /* 四化严格规范 */
        .hua-marker { position: absolute; bottom: -18px; left: 50%; transform: translateX(-50%); font-size: 11px; padding: 2px; border-radius: 2px; writing-mode: horizontal-tb; color: #fff; font-weight: bold; text-shadow: none; }
        .hua-lu .hua-marker { background: var(--lu-green); }
        .hua-quan .hua-marker { background: var(--quan-blue); }
        .hua-ke .hua-marker { background: var(--ke-white); color: #000; }
        .hua-ji { color: var(--ji-red) !important; animation: pulseRed 1.5s infinite; }
        .hua-ji .hua-marker { background: var(--ji-red); }

        @keyframes pulseRed {
            0%, 100% { text-shadow: 0 0 5px var(--ji-red); opacity: 1; }
            50% { text-shadow: 0 0 15px var(--ji-red); opacity: 0.7; }
        }

        /* 宫位其他信息 */
        .p-gan { position: absolute; top: 10px; left: 10px; color: var(--gold); font-weight: bold; font-size: 16px; opacity:0; }
        .p-branch { position: absolute; bottom: 10px; right: 10px; font-size: 12px; color: #555; opacity:0; }
        .palace.active .p-gan, .palace.active .p-branch { opacity: 1; transition: opacity 0.5s; }

        /* --- 4. 核心层：全息八卦能量枢纽 --- */
        .center-hub {
            grid-area: 2 / 2 / 4 / 4; position: relative; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 10;
        }

        #bagua-core { width: 320px; height: 320px; transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1); transform-origin: center; }
        .taiji { transform-origin: center; animation: spin 20s linear infinite; }
        .taiji.male { animation-direction: normal; } /* 男顺 */
        .taiji.female { animation-direction: reverse; } /* 女逆 */
        .taiji.fast { animation-duration: 2s; filter: drop-shadow(0 0 20px var(--gold)); }
        
        .ring-text { font-family: "Microsoft YaHei"; fill: var(--gold); font-size: 14px; font-weight: bold; letter-spacing: 2px; }
        .bagua-symbols { fill: rgba(212,175,55,0.4); font-size: 22px; transform-origin: center; animation: spin 40s linear infinite reverse; }
        .bagua-symbols.fast { animation-duration: 3s; fill: var(--gold); filter: drop-shadow(0 0 15px var(--gold)); }

        @keyframes spin { 100% { transform: rotate(360deg); } }

        .status-text { position: absolute; bottom: -10px; font-family: monospace; color: var(--gold); font-size: 12px; opacity: 0.8; transition: 0.3s; }
        .cursor { animation: blink 1s step-end infinite; }
        @keyframes blink { 50% { opacity: 0; } }

        /* 磨砂玻璃罗盘态 (排盘后) */
        .bagua-core.active {
            background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            transform: scale(0.4); border: 1px solid rgba(212, 175, 55, 0.3); border-radius: 50%;
            box-shadow: 0 0 30px rgba(0,0,0,0.8), inset 0 0 20px rgba(212,175,55,0.1); cursor: pointer;
        }
        .bagua-core.active .bagua-symbols { fill: var(--gold); animation-duration: 60s; }
        
        .core-info-overlay {
            position: absolute; opacity: 0; pointer-events: none; transition: 0.5s; text-align: center;
            color: var(--gold); font-weight: bold; font-size: 24px; text-shadow: 0 0 10px #000;
        }
        .bagua-core.active + .core-info-overlay { opacity: 1; pointer-events: auto; }

        /* --- 5. 右侧解析面板 (内发光) --- */
        .analysis-panel { display: flex; flex-direction: column; gap: 20px; transition: transform 0.5s; }
        .panel { 
            background: var(--panel-bg); border: 1px solid var(--border-color); padding: 25px; 
            box-shadow: inset 0 0 30px rgba(212,175,55,0.05); position: relative; min-height: 200px;
        }
        .panel::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 2px; background: linear-gradient(90deg, transparent, var(--gold), transparent); opacity: 0.6; }
        .panel h3 { margin: 0 0 15px 0; color: var(--gold); font-size: 18px; letter-spacing: 2px; }
        
        .placeholder-scan { color: #444; font-family: monospace; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); animation: scanPulse 2s infinite; }
        @keyframes scanPulse { 50% { opacity: 0.3; } }

        .term-box { font-size: 15px; line-height: 1.8; color: #ccc; }
        .highlight { font-size: 16px; color: var(--gold); font-weight: bold; text-shadow: 0 0 5px rgba(212,175,55,0.5); }
        .highlight.danger { color: var(--ji-red); text-shadow: 0 0 5px rgba(255,0,0,0.5); }

        /* Overlay 遮罩 */
        #deploy-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85);
            z-index: 50; opacity: 0; pointer-events: none; transition: opacity 0.2s;
        }
    </style>
</head>
<body>

<div id="deploy-overlay"></div>

<div class="top-bar">
    <select id="gender" onchange="triggerCore()"><option value="1">乾造 (男)</option><option value="0">坤造 (女)</option></select>
    <select id="ySel" onchange="triggerCore()"></select>
    <select id="mSel" onchange="triggerCore()"></select>
    <select id="dSel" onchange="triggerCore()"></select>
    <select id="hSel" onchange="triggerCore()"></select>
    <button class="btn-deploy" id="btnDeploy" onclick="startDeployment()">⚡ 布阵排盘</button>
</div>

<div class="layout-container">
    <div class="chart-grid" id="mainGrid">
        <div class="center-hub" id="centerHub">
            <svg id="bagua-core" viewBox="0 0 200 200" class="idle">
                <circle cx="100" cy="100" r="95" fill="none" stroke="rgba(212,175,55,0.1)" stroke-width="1"/>
                
                <g class="bagua-symbols" id="bagua-ring">
                    <text x="100" y="22" text-anchor="middle">☰</text>
                    <text x="155" y="45" text-anchor="middle">☱</text>
                    <text x="178" y="105" text-anchor="middle">☲</text>
                    <text x="155" y="165" text-anchor="middle">☳</text>
                    <text x="100" y="188" text-anchor="middle">☴</text>
                    <text x="45" y="165" text-anchor="middle">☵</text>
                    <text x="22" y="105" text-anchor="middle">☶</text>
                    <text x="45" y="45" text-anchor="middle">☷</text>
                </g>

                <g class="ring-text">
                    <text x="100" y="55" text-anchor="middle" id="ring-year">壬寅</text>
                    <text x="145" y="105" text-anchor="middle" id="ring-month">丁未</text>
                    <text x="100" y="155" text-anchor="middle" id="ring-day">庚子</text>
                    <text x="55" y="105" text-anchor="middle" id="ring-hour">丙戌</text>
                </g>

                <g class="taiji male" id="taiji-core" transform="translate(100, 100) scale(0.35)">
                    <path d="M0 -50 A50 50 0 0 1 0 50 A25 25 0 0 0 0 0 A25 25 0 0 1 0 -50" fill="#d4af37"/>
                    <path d="M0 -50 A50 50 0 0 0 0 50 A25 25 0 0 0 0 0 A25 25 0 0 1 0 -50" fill="#050505" stroke="#d4af37" stroke-width="1"/>
                    <circle cx="0" cy="-25" r="8" fill="#050505"/>
                    <circle cx="0" cy="25" r="8" fill="#d4af37"/>
                </g>
            </svg>
            <div class="core-info-overlay" id="coreGlassInfo">
                <div style="font-size:16px;" id="glass-ju">火六局</div>
                <div style="font-size:12px; margin-top:5px; color:#aaa;">真太阳时校验完成</div>
            </div>
            <div class="status-text" id="status-text">> 系统就绪... 等待生辰注入 <span class="cursor">_</span></div>
        </div>
    </div>

    <div class="analysis-panel" id="rightPanel">
        <div class="panel">
            <h3>命理核心解算</h3>
            <div class="placeholder-scan" id="scan-full">Awaiting Data...</div>
            <div class="term-box" id="res-full"></div>
        </div>
        <div class="panel">
            <h3>大限时空轨线</h3>
            <div class="placeholder-scan" id="scan-limit">Awaiting Data...</div>
            <div class="term-box" id="res-limit"></div>
        </div>
    </div>
</div>

<script>
    // 初始化下拉
    const ySel = document.getElementById('ySel');
    const mSel = document.getElementById('mSel');
    const dSel = document.getElementById('dSel');
    const hSel = document.getElementById('hSel');
    for(let i=1970; i<=2030; i++) ySel.options.add(new Option(`${i}年`, i));
    for(let i=1; i<=12; i++) mSel.options.add(new Option(`${i}月`, i));
    for(let i=1; i<=30; i++) dSel.options.add(new Option(`${i}日`, i));
    const hours = ["子","丑","寅","卯","辰","巳","午","未","申","酉","戌","亥"];
    hours.forEach(h => hSel.options.add(new Option(`${h}时`, h)));

    const gridLayout = ["4/1", "4/2", "4/3", "4/4", "3/4", "2/4", "1/4", "1/3", "1/2", "1/1", "2/1", "3/1"];
    const pNames = ["命宫","兄弟","夫妻","子女","财帛","疾厄","迁移","奴仆","官禄","田宅","福德","父母"];

    // 核心目标 4: 动态文案引擎 (AnalysisGenerator)
    const starDict = {
        "七杀": { text: "命主性格<span class='highlight'>刚毅果决</span>，具开创之功。一生<span class='highlight'>动荡起伏</span>，宜在变局中求胜。属于典型的武职格局。", limit: "当前大限变动剧烈，面临事业与人生的<span class='highlight'>重大抉择</span>。" },
        "天机": { text: "命主<span class='highlight'>思维敏捷</span>，善谋略，但多思多虑。宜从事策划、五术或幕僚工作，切忌<span class='highlight danger'>心浮气躁</span>。", limit: "大限遇智星，宜进修学习，<span class='highlight'>切勿盲目投资</span>。" },
        "贪狼": { text: "命带桃花与物欲，<span class='highlight'>交际手腕高明</span>。逢吉则发，逢煞则易生酒色之灾，为标准之<span class='highlight'>杀破狼格</span>。", limit: "此运程财源广进，欲望极强，需谨防<span class='highlight danger'>因贪致贫</span>。" },
        "紫微": { text: "命宫主星尊贵，具<span class='highlight'>领袖气质</span>。一生得贵人相助，但若无左辅右弼，易成<span class='highlight danger'>孤君</span>。", limit: "大运平稳，事业有望拔高，宜掌权固位。" }
    };

    function generateAnalysisData(yearIdx, genderVal) {
        // 根据输入动态生成数据，彻底杜绝死板复制
        const offset = yearIdx + parseInt(genderVal);
        const stars = ["七杀", "天机", "贪狼", "紫微"];
        const mainStar = stars[offset % 4];
        const isJi = (yearIdx % 3 === 0); // 伪随机化忌
        
        const data = [];
        for(let i=0; i<12; i++) {
            const isMing = (i === (offset % 12));
            data.push({
                name: pNames[i],
                gan: ["甲","乙","丙","丁","戊","己","庚","辛","壬","癸"][i%10],
                branch: hours[i],
                main: isMing ? [mainStar] : [],
                hua: isMing && isJi ? "ji" : (isMing ? "lu" : "")
            });
        }
        
        let text = starDict[mainStar].text;
        if(isJi) text += " 然命宫见<span class='highlight danger'>化忌</span>，主明珠蒙尘，需防小人作祟。";
        
        return { chartData: data, fullText: text, limitText: starDict[mainStar].limit, ju: ["水二局","木三局","金四局","土五局","火六局"][offset%5] };
    }

    // 初始化网格
    function initGrid() {
        const grid = document.getElementById('mainGrid');
        Array.from(grid.children).forEach(el => { if(el.id !== 'centerHub') el.remove(); });
        for(let i=0; i<12; i++) {
            const p = document.createElement('div');
            p.className = 'palace idle';
            p.id = `palace-${i}`;
            p.style.gridArea = gridLayout[i];
            p.innerHTML = `<div class="palace-name">${pNames[i]}</div>`;
            grid.appendChild(p);
        }
    }

    // 联动触发器
    let reactTimer;
    function triggerCore() {
        const taiji = document.getElementById('taiji-core');
        const bagua = document.getElementById('bagua-ring');
        const st = document.getElementById('status-text');
        
        taiji.className = `taiji fast ${document.getElementById('gender').value === '1' ? 'male' : 'female'}`;
        bagua.classList.add('fast');
        st.innerHTML = "> 引擎高速演算中... <span class='cursor'>_</span>";
        
        const gans = ["甲","乙","丙","丁","戊","己","庚","辛","壬","癸"];
        document.getElementById('ring-year').innerText = gans[ySel.selectedIndex%10] + "年";

        clearTimeout(reactTimer);
        reactTimer = setTimeout(() => {
            taiji.classList.remove('fast');
            bagua.classList.remove('fast');
            st.innerHTML = "> 系统就绪... 等待生辰注入 <span class='cursor'>_</span>";
        }, 800);
    }

    // --- 核心目标 3: 动画序列执行器 ---
    async function startDeployment() {
        const btn = document.getElementById('btnDeploy');
        const overlay = document.getElementById('deploy-overlay');
        const core = document.getElementById('bagua-core');
        const stText = document.getElementById('status-text');
        
        btn.disabled = true;
        document.getElementById('gender').disabled = true;
        
        // 生成动态数据
        const dataPayload = generateAnalysisData(ySel.selectedIndex, document.getElementById('gender').value);
        
        // Phase 1 (0.0s): 引擎启动
        console.log("[Audio] 高频电流声 + 机械锁定");
        overlay.style.opacity = '1';
        core.style.filter = 'drop-shadow(0 0 40px var(--gold)) scale(1.1)';
        stText.innerHTML = "> SYSTEM LOCKING...";
        
        await new Promise(r => setTimeout(r, 500));
        
        // Phase 2 (0.5s): 星图展开 & 激光边框
        console.log("[Audio] 激光扫描声");
        overlay.style.opacity = '0';
        core.classList.remove('idle');
        core.classList.add('active'); // 转为磨砂玻璃罗盘
        stText.style.display = 'none';
        document.getElementById('glass-ju').innerText = dataPayload.ju;

        dataPayload.chartData.forEach((d, i) => {
            const p = document.getElementById(`palace-${i}`);
            p.classList.remove('idle');
            p.classList.add('active');
            
            let sHTML = '';
            d.main.forEach(s => {
                let hClass = d.hua ? `hua-${d.hua}` : '';
                let marker = '';
                if(d.hua === 'lu') marker = `<div class="hua-marker">禄</div>`;
                if(d.hua === 'ji') marker = `<div class="hua-marker">忌</div>`;
                
                // 动画注入：带缩放反弹与滤镜
                sHTML += `<div class="m-star gold ${hClass}" style="animation: starLand 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; animation-delay: ${1.2 + (i*0.06)}s;">${s}${marker}</div>`;
            });

            p.innerHTML = `
                <div class="p-gan">${d.gan}</div>
                <div class="p-branch">${d.branch}</div>
                <div class="star-container">${sHTML}</div>
                <div class="palace-name" style="font-size:14px; opacity:0.6; top:auto; bottom:5px;">${d.name}</div>
            `;
        });

        await new Promise(r => setTimeout(r, 1500)); // 等待星曜飞入 (1.2s - 2.0s)
        console.log("[Audio] 晶体坠落声");
        
        // Phase 4 (2.0s+): 数据解析打字机
        console.log("[Audio] 数据传输声");
        document.getElementById('scan-full').style.display = 'none';
        document.getElementById('scan-limit').style.display = 'none';
        
        typeWriter('res-full', `> [数据解析完毕]<br><br>${dataPayload.fullText}`);
        setTimeout(() => {
            typeWriter('res-limit', `> [轨道监测完毕]<br><br>${dataPayload.limitText}`);
            btn.disabled = false;
            document.getElementById('gender').disabled = false;
        }, 1000);
    }

    function typeWriter(id, htmlStr) {
        const el = document.getElementById(id);
        el.innerHTML = "";
        let i = 0; let isTag = false; let current = "";
        const timer = setInterval(() => {
            if(i >= htmlStr.length) { clearInterval(timer); return; }
            const char = htmlStr.charAt(i);
            if(char === '<') isTag = true;
            current += char;
            el.innerHTML = current + (isTag ? "" : "<span class='cursor'>_</span>");
            if(char === '>') isTag = false;
            i++;
        }, 15);
    }

    window.onload = initGrid;
</script>
</body>
</html>
