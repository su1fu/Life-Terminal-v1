<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>TERMINAL 3.0 | 赛博紫微核心</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;900&display=swap');
        :root { --gold: #d4af37; --bg: #050505; --text: #e0e0e0; --alert: #ff4444; --cyan: #00f3ff; }
        body { background: var(--bg); color: var(--text); font-family: 'Noto Serif SC', serif; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .terminal { width: 100%; max-width: 1200px; }
        
        header { border-bottom: 1px solid var(--gold); padding-bottom: 15px; text-align: center; margin-bottom: 20px; }
        header h1 { letter-spacing: 12px; color: var(--gold); font-size: 26px; margin: 0; text-shadow: 0 0 10px rgba(212,175,55,0.3); }
        
        /* 全维生辰输入区 */
        .control-panel { background: rgba(212,175,55,0.05); padding: 15px; display: flex; flex-wrap: wrap; gap: 15px; justify-content: center; align-items: flex-end; border: 1px solid rgba(212,175,55,0.3); box-shadow: inset 0 0 20px rgba(0,0,0,0.8); }
        .input-group { display: flex; flex-direction: column; gap: 5px; }
        .input-group label { font-size: 12px; color: var(--gold); letter-spacing: 2px; }
        select { background: #111; border: 1px solid var(--gold); color: var(--gold); padding: 8px; outline: none; cursor: pointer; }
        button { background: transparent; border: 1px solid var(--cyan); color: var(--cyan); padding: 8px 20px; cursor: pointer; font-weight: bold; letter-spacing: 2px; transition: all 0.3s; text-transform: uppercase; }
        button:hover { background: var(--cyan); color: #000; box-shadow: 0 0 15px var(--cyan); }

        /* 正统 12宫 回字形星盘 */
        .chart-container { display: flex; justify-content: center; margin: 30px 0; }
        .ziwei-grid { display: grid; grid-template-columns: repeat(4, 1fr); grid-template-rows: repeat(4, 1fr); gap: 4px; width: 100%; max-width: 800px; aspect-ratio: 1/1; position: relative; }
        .palace { border: 1px solid rgba(212,175,55,0.2); background: rgba(20,20,20,0.8); padding: 10px; position: relative; display: flex; flex-direction: column; transition: all 0.3s ease; }
        .palace-dz { position: absolute; bottom: 5px; right: 5px; font-size: 14px; color: rgba(212,175,55,0.5); }
        .palace-name { position: absolute; bottom: 5px; left: 5px; font-size: 14px; color: var(--gold); font-weight: bold; }
        .stars { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 5px; }
        .star { writing-mode: vertical-rl; font-size: 16px; color: var(--text); font-weight: 900; letter-spacing: 2px; }
        .star.major { color: var(--gold); }
        .star.alert { color: var(--alert); text-shadow: 0 0 5px var(--alert); border: 1px solid var(--alert); padding: 2px; font-size: 12px; }

        /* 中央引擎区 & 动画 */
        .center-core { grid-area: 2 / 2 / 4 / 4; display: flex; flex-direction: column; align-items: center; justify-content: center; border: 1px dashed rgba(212,175,55,0.3); position: relative; overflow: hidden; }
        .core-ring { position: absolute; width: 80%; height: 80%; border: 2px solid transparent; border-top: 2px solid var(--gold); border-bottom: 2px solid var(--gold); border-radius: 50%; opacity: 0.1; transition: all 1s; }
        .animating .core-ring { animation: rotateCore 2s linear infinite; opacity: 0.8; }
        .animating .palace { animation: scanPulse 1.5s infinite alternate; }
        .highlighted { background: rgba(212,175,55,0.2) !important; border-color: var(--gold) !important; box-shadow: 0 0 15px rgba(212,175,55,0.5); transform: scale(1.02); z-index: 10; }

        @keyframes rotateCore { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes scanPulse { 0% { border-color: rgba(212,175,55,0.2); } 100% { border-color: var(--cyan); box-shadow: inset 0 0 10px rgba(0,243,255,0.2); } }

        /* 解析面板 */
        .analysis-panel { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
        .card { border-top: 2px solid var(--gold); background: rgba(212,175,55,0.05); padding: 20px; font-size: 15px; line-height: 1.6; }
        .card h3 { color: var(--gold); margin-top: 0; }
        .log-text { font-family: monospace; color: var(--cyan); margin-bottom: 10px; display: block; }
    </style>
</head>
<body>
    <div class="terminal">
        <header>
            <h1>生命終端 · 紫微智算 3.0</h1>
        </header>

        <section class="control-panel">
            <div class="input-group"><label>出生年</label><select id="year"></select></div>
            <div class="input-group"><label>出生月(农历)</label><select id="month"></select></div>
            <div class="input-group"><label>出生日(农历)</label><select id="day"></select></div>
            <div class="input-group">
                <label>出生时辰</label>
                <select id="hour">
                    <option value="1">子时 (23:00-01:00)</option>
                    <option value="2">丑时 (01:00-03:00)</option>
                    <option value="3">寅时 (03:00-05:00)</option>
                    <option value="4">卯时 (05:00-07:00)</option>
                    <option value="5">辰时 (07:00-09:00)</option>
                    <option value="6">巳时 (09:00-11:00)</option>
                    <option value="7">午时 (11:00-13:00)</option>
                    <option value="8">未时 (13:00-15:00)</option>
                    <option value="9">申时 (15:00-17:00)</option>
                    <option value="10">酉时 (17:00-19:00)</option>
                    <option value="11">戌时 (19:00-21:00)</option>
                    <option value="12">亥时 (21:00-23:00)</option>
                </select>
            </div>
            <button onclick="startAudit()">接入引擎进行推算</button>
        </section>

        <div class="chart-container">
            <div class="ziwei-grid" id="grid">
                </div>
        </div>

        <div class="analysis-panel">
            <div class="card">
                <h3>系统运行日志</h3>
                <span class="log-text" id="sys-log">等待输入生辰坐标...</span>
                <div id="logic-text"></div>
            </div>
            <div class="card">
                <h3>终端审计报告</h3>
                <div id="advice-text">系统待机中。</div>
            </div>
        </div>
    </div>

    <script>
        // 12地支及正统排盘顺序（寅始，顺时针）
        const DI_ZHI = ["寅", "卯", "辰", "巳", "午", "未", "申", "酉", "戌", "亥", "子", "丑"];
        const PALACE_NAMES = ["命宫", "兄弟", "夫妻", "子女", "财帛", "疾厄", "迁移", "奴仆", "官禄", "田宅", "福德", "父母"];
        
        // 构建UI下拉框选项
        window.onload = () => {
            let yHtml = "", mHtml = "", dHtml = "";
            for(let i=1970; i<=2030; i++) yHtml += `<option value="${i}">${i}年</option>`;
            for(let i=1; i<=12; i++) mHtml += `<option value="${i}">${i}月</option>`;
            for(let i=1; i<=30; i++) dHtml += `<option value="${i}">${i}日</option>`;
            document.getElementById('year').innerHTML = yHtml;
            document.getElementById('month').innerHTML = mHtml;
            document.getElementById('day').innerHTML = dHtml;
            document.getElementById('year').value = "1996"; // 默认设为丙子年附近
            
            renderEmptyGrid();
        };

        // 渲染正统的 回字形 布局
        function renderEmptyGrid() {
            const grid = document.getElementById('grid');
            grid.innerHTML = '<div class="center-core"><div class="core-ring"></div><div class="core-ring" style="width:60%;height:60%;animation-direction:reverse;border-color:var(--cyan)"></div><div style="color:var(--gold);letter-spacing:5px;z-index:2;text-align:center">CORE<br>ENGINE</div></div>';
            
            // 按照CSS Grid的位置映射12地支 (巳午未申在顶，辰酉在侧...)
            const layoutMap = {
                "巳": "1/1/2/2", "午": "1/2/2/3", "未": "1/3/2/4", "申": "1/4/2/5",
                "辰": "2/1/3/2", "酉": "2/4/3/5",
                "卯": "3/1/4/2", "戌": "3/4/4/5",
                "寅": "4/1/5/2", "丑": "4/2/5/3", "子": "4/3/5/4", "亥": "4/4/5/5"
            };

            DI_ZHI.forEach((zhi, index) => {
                const div = document.createElement('div');
                div.className = 'palace';
                div.id = `palace-${index}`; // 0=寅, 1=卯...
                div.style.gridArea = layoutMap[zhi];
                div.innerHTML = `
                    <div class="stars" id="stars-${index}"></div>
                    <span class="palace-name" id="pname-${index}">未排盘</span>
                    <span class="palace-dz">${zhi}</span>
                `;
                grid.appendChild(div);
            });
        }

        function startAudit() {
            const grid = document.getElementById('grid');
            const log = document.getElementById('sys-log');
            
            // 1. 触发全盘扫描动画
            grid.classList.add('animating');
            log.innerText = ">> 引擎启动... 正在扫描时空坐标...";
            document.querySelectorAll('.palace').forEach(p => {
                p.classList.remove('highlighted');
                p.querySelector('.stars').innerHTML = ''; // 清空旧星星
            });

            // 模拟计算延迟以展示动画
            setTimeout(() => {
                computeDestiny();
                grid.classList.remove('animating');
            }, 1500);
        }

        // 核心排盘逻辑引擎
        function computeDestiny() {
            const year = parseInt(document.getElementById('year').value);
            const month = parseInt(document.getElementById('month').value);
            const hour = parseInt(document.getElementById('hour').value);

            // 正统命宫推算法则：从寅宫(0)起正月，顺数至生月，逆数至生时
            // (0 + month - 1 - (hour - 1) + 12) % 12
            const mingGongIndex = (0 + (month - 1) - (hour - 1) + 12) % 12;

            // 逆时针排12宫名
            for(let i=0; i<12; i++) {
                // 当前格子距离命宫的偏移量
                const offset = (mingGongIndex - i + 12) % 12; 
                document.getElementById(`pname-${i}`).innerText = PALACE_NAMES[offset];
            }

            // 模拟专业审计结果（根据年份尾数判断天干，触发四化）
            const yearLastDigit = year % 10;
            let targetPalaceIndex = (mingGongIndex + 8) % 12; // 默认冲击官禄宫 (命宫逆数8)
            let alertText = "";
            let advice = "";

            if (yearLastDigit === 6) { // 丙年 (如1996, 2026)
                document.getElementById(`stars-${targetPalaceIndex}`).innerHTML = '<span class="star major">天机</span><span class="star alert">化忌</span>';
                alertText = `[高危] 探测到【天机化忌】直冲 ${DI_ZHI[targetPalaceIndex]}宫(${document.getElementById(`pname-${targetPalaceIndex}`).innerText})`;
                advice = "<b>专家级预警：</b> 丙年磁场触发天机星逻辑阻滞。作为开发者，你本命盘的逻辑层正遭遇干扰。<b>强烈建议：</b> 停止核心代码重构，全面转入 Bug 修复与防御性编程模式。";
            } else {
                document.getElementById(`stars-${targetPalaceIndex}`).innerHTML = '<span class="star major">武曲</span><span class="star alert">化权</span>';
                alertText = `[洞察] 探测到【化权】能量汇聚于 ${DI_ZHI[targetPalaceIndex]}宫(${document.getElementById(`pname-${targetPalaceIndex}`).innerText})`;
                advice = "<b>执行力暴增：</b> 当前时空节点有利于攻克技术难关，底层架构稳定，建议快速推进核心模块的开发。";
            }

            // UI 反馈
            document.getElementById(`palace-${targetPalaceIndex}`).classList.add('highlighted');
            document.getElementById('sys-log').innerText = `>> 坐标定位完毕：${year}年 ${month}月 ${hour}时\n>> 命宫落于：${DI_ZHI[mingGongIndex]}宫`;
            document.getElementById('logic-text').innerHTML = `<br><span style="color:var(--alert)">${alertText}</span>`;
            document.getElementById('advice-text').innerHTML = advice;
        }
    </script>
</body>
</html>
