<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>专业紫微斗数排盘终端 - 简体版</title>
    <style>
        :root {
            --gold: #d4b170; --gold-dark: #8e7341; --bg: #0a0a0a;
            --palace-bg: #111; --border: #2a2a2a; --text: #cccccc;
        }

        body { background: var(--bg); color: var(--text); font-family: "Microsoft YaHei", sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; }

        /* 顶部完整交互区 */
        .top-bar {
            width: 100%; padding: 20px; background: #000; border-bottom: 1px solid var(--border);
            display: flex; justify-content: center; gap: 10px; align-items: center;
        }
        select, button {
            background: #151515; border: 1px solid var(--gold-dark); color: var(--gold);
            padding: 6px 12px; font-size: 14px; cursor: pointer; outline: none;
        }
        button { background: var(--gold-dark); color: #000; font-weight: bold; padding: 6px 20px; transition: 0.3s; }
        button:hover { background: var(--gold); box-shadow: 0 0 15px var(--gold-dark); }

        .layout-container { display: grid; grid-template-columns: 860px 380px; gap: 30px; padding: 30px; }

        /* 命盘区域 */
        .chart-grid {
            display: grid; grid-template-columns: repeat(4, 215px); grid-template-rows: repeat(4, 215px);
            gap: 1px; background: var(--border); border: 1px solid var(--border);
        }

        .palace {
            background: var(--palace-bg); position: relative; padding: 12px; box-sizing: border-box;
            transition: 0.5s; opacity: 0.4; /* 初始预加载状态 */
        }
        .palace.active { opacity: 1; }

        /* 宫位细节 */
        .p-gan { position: absolute; top: 8px; left: 8px; color: var(--gold); font-weight: bold; font-size: 16px; }
        .p-age { position: absolute; top: 8px; right: 8px; color: #444; font-size: 11px; }
        .p-name { position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%); color: var(--gold-dark); font-weight: bold; font-size: 16px; letter-spacing: 2px; }
        .p-shishen { position: absolute; bottom: 8px; left: 8px; font-size: 10px; color: #333; }
        .p-branch { position: absolute; bottom: 8px; right: 8px; font-size: 11px; color: #333; }

        .star-container { display: flex; flex-direction: row-reverse; gap: 8px; height: 130px; margin-top: 20px; }
        .main-star { writing-mode: vertical-rl; font-size: 22px; font-weight: bold; color: #eee; letter-spacing: 3px; }
        .main-star.ji::after { content: '忌'; background: #900; color: #fff; font-size: 10px; padding: 2px; border-radius: 2px; writing-mode: horizontal-tb; position: absolute; bottom: -15px; left: 0; }
        .sub-star { writing-mode: vertical-rl; font-size: 12px; color: #666; margin-top: 10px; }

        /* 中宫 UI 重构 */
        .center-hub {
            grid-area: 2 / 2 / 4 / 4; background: #000; border: 1px solid var(--gold-dark);
            display: flex; flex-direction: column; padding: 20px; justify-content: space-between;
        }
        .hub-title { border-bottom: 2px solid var(--gold-dark); text-align: center; padding-bottom: 10px; }
        .hub-title h2 { margin: 0; color: var(--gold); letter-spacing: 5px; font-size: 28px; }
        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .info-item { border: 1px solid #222; padding: 6px; font-size: 13px; color: var(--gold); text-align: center; }
        .bazi-box { background: var(--gold-dark); color: #000; padding: 8px; display: flex; justify-content: space-around; font-weight: bold; font-size: 15px; margin: 10px 0; }

        /* 解析侧边栏 - 严格拆分 */
        .sidebar { display: flex; flex-direction: column; gap: 20px; }
        .audit-section { background: #111; border: 1px solid var(--border); padding: 20px; border-top: 3px solid var(--gold-dark); }
        .audit-section h3 { margin: 0 0 15px 0; color: var(--gold); font-size: 18px; border-bottom: 1px solid #222; padding-bottom: 5px; }
        .log-box { font-size: 11px; color: #444; height: 40px; overflow: hidden; font-family: monospace; line-height: 1.4; }
        .result-box { font-size: 14px; line-height: 1.8; color: #aaa; min-height: 100px; }
        .audit-btn { width: 100%; background: none; border: 1px solid var(--gold-dark); color: var(--gold); padding: 8px; margin-top: 10px; cursor: pointer; transition: 0.3s; }
        .audit-btn:hover { background: #1a1a1a; }
    </style>
</head>
<body>

<div class="top-bar">
    <select id="gender"><option value="1">乾造 (男)</option><option value="0">坤造 (女)</option></select>
    <select id="ySel"></select>
    <select id="mSel"></select>
    <select id="dSel"></select>
    <select id="hSel"></select>
    <button onclick="deployChart()">布阵排盘</button>
</div>

<div class="layout-container">
    <div class="chart-grid" id="mainGrid">
        <div class="center-hub">
            <div class="hub-title"><h2>命理终端</h2></div>
            <div class="info-grid">
                <div class="info-item">命宫: <span id="c-ming">--</span></div>
                <div class="info-item">身宫: <span id="c-shen">--</span></div>
                <div class="info-item">局数: <span id="c-ju">--</span></div>
                <div class="info-item">生肖: <span id="c-sx">--</span></div>
            </div>
            <div class="bazi-box" id="c-bazi">
                <span>--</span><span>--</span><span>--</span><span>--</span>
            </div>
            <div style="text-align: center; font-size: 11px; color: #555;">
                当前流年: 2026 丙午
            </div>
        </div>
    </div>

    <div class="sidebar">
        <div class="audit-section">
            <h3>命盘全析</h3>
            <div id="log-full" class="log-box">> 引擎就绪...</div>
            <div id="res-full" class="result-box">等待数据注入...</div>
            <button class="audit-btn" onclick="runAnalysis('full')">启动全盘深度审计</button>
        </div>

        <div class="audit-section">
            <h3>大限详析</h3>
            <div id="log-limit" class="log-box">> 轨道监控正常...</div>
            <div id="res-limit" class="result-box">等待大运推演...</div>
            <button class="audit-btn" onclick="runAnalysis('limit')">执行十年运势分析</button>
        </div>
    </div>
</div>

<script>
    // 1. 补齐所有下拉选项
    const ySel = document.getElementById('ySel');
    const mSel = document.getElementById('mSel');
    const dSel = document.getElementById('dSel');
    const hSel = document.getElementById('hSel');

    for(let i=1970; i<=2030; i++) ySel.options.add(new Option(`${i}年`, i));
    for(let i=1; i<=12; i++) mSel.options.add(new Option(`${i}月`, i));
    for(let i=1; i<=30; i++) dSel.options.add(new Option(`${i}日`, i));
    const hours = ["子","丑","寅","卯","辰","巳","午","未","申","酉","戌","亥"];
    hours.forEach(h => hSel.options.add(new Option(`${h}时`, h)));

    const PALACE_DATA = [
        { name: "命宫", gan: "丙", age: "4-13", main: ["廉贞","七杀"], sub: ["擎羊"], hua: "ji", shen: "长生" },
        { name: "兄弟", gan: "丁", age: "14-23", main: ["天梁"], sub: ["左辅"], hua: "", shen: "沐浴" },
        { name: "夫妻", gan: "戊", age: "24-33", main: ["紫微","天相"], sub: ["地劫"], hua: "", shen: "冠带" },
        { name: "子女", gan: "己", age: "34-43", main: ["天机","巨门"], sub: ["火星"], hua: "lu", shen: "临官" },
        { name: "财帛", gan: "庚", age: "44-53", main: ["贪狼"], sub: ["陀罗"], hua: "", shen: "帝旺" },
        { name: "疾厄", gan: "辛", age: "54-63", main: ["太阳","太阴"], sub: ["天魁"], hua: "", shen: "衰" },
        { name: "迁移", gan: "壬", age: "64-73", main: ["武曲","天府"], sub: ["禄存"], hua: "", shen: "病" },
        { name: "奴仆", gan: "癸", age: "74-83", main: ["天同"], sub: ["文曲"], hua: "", shen: "死" },
        { name: "官禄", gan: "甲", age: "84-93", main: ["破军"], sub: ["天马"], hua: "", shen: "墓" },
        { name: "田宅", gan: "乙", age: "94-103", main: ["无主星"], sub: ["红鸾"], hua: "", shen: "绝" },
        { name: "福德", gan: "丙", age: "104-113", main: ["廉贞"], sub: ["龙池"], hua: "", shen: "胎" },
        { name: "父母", gan: "丁", age: "114-123", main: ["巨门"], sub: ["天哭"], hua: "", shen: "养" }
    ];

    const layout = ["4/1", "4/2", "4/3", "4/4", "3/4", "2/4", "1/4", "1/3", "1/2", "1/1", "2/1", "3/1"];

    // 2. 初始化显示空位（虚影状态）
    function initEmpty() {
        const grid = document.getElementById('mainGrid');
        PALACE_DATA.forEach((d, i) => {
            const p = document.createElement('div');
            p.className = 'palace';
            p.style.gridArea = layout[i];
            p.innerHTML = `<div class="p-name" style="opacity:0.2">${d.name}</div>`;
            grid.appendChild(p);
        });
    }

    // 3. 执行排盘
    function deployChart() {
        const grid = document.getElementById('mainGrid');
        Array.from(grid.querySelectorAll('.palace')).forEach(e => e.remove());

        // 更新中宫信息
        document.getElementById('c-ming').innerText = "寅宫";
        document.getElementById('c-ju').innerText = "木三局";
        document.getElementById('c-sx').innerText = "甲戌犬";
        document.getElementById('c-bazi').innerHTML = "<span>甲戌</span><span>己巳</span><span>壬申</span><span>丙午</span>";

        PALACE_DATA.forEach((d, i) => {
            const p = document.createElement('div');
            p.className = 'palace active';
            p.style.gridArea = layout[i];
            
            let sHTML = '';
            d.main.forEach((s, idx) => {
                const jClass = (idx === 0 && d.hua === 'ji') ? 'ji' : '';
                sHTML += `<div class="main-star ${jClass}">${s}</div>`;
            });
            d.sub.forEach(s => sHTML += `<div class="sub-star">${s}</div>`);

            p.innerHTML = `
                <div class="p-gan">${d.gan}</div>
                <div class="p-age">${d.age}</div>
                <div class="star-container">${sHTML}</div>
                <div class="p-name">${d.name}</div>
                <div class="p-shishen">${d.shen}</div>
                <div class="p-branch">${["寅","卯","辰","巳","午","未","申","酉","戌","亥","子","丑"][i]}</div>
            `;
            grid.appendChild(p);
        });
    }

    // 4. 深度审计逻辑
    function runAnalysis(type) {
        const logId = type === 'full' ? 'log-full' : 'log-limit';
        const resId = type === 'full' ? 'res-full' : 'res-limit';
        const log = document.getElementById(logId);
        const res = document.getElementById(resId);

        log.innerHTML = "> 正在连接天星数据库...<br>> 坐标对齐成功...";
        res.innerHTML = "系统正在计算中...";

        setTimeout(() => {
            if(type === 'full') {
                res.innerHTML = "【整体解析】命宫廉贞七杀在寅，化忌同宫。此象主性格刚毅、敢于开拓，但人生多纠葛，容易陷入自我矛盾。事业宜在动荡中求财，需防范情绪化决策导致的阻碍。";
            } else {
                res.innerHTML = "【大限详解】当前步入十年财帛大运。贪狼坐守，欲望扩张，财源较广但起伏剧烈。此运程宜保持定力，戒骄戒躁，谨防因小失大，是积累经验与财富的关键期。";
            }
            log.innerHTML += "<br>> 推演完成。";
        }, 1000);
    }

    window.onload = initEmpty;
</script>
</body>
</html>
