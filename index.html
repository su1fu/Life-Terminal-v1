<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>TERMINAL 2.0 | 紫微智算核心</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;900&display=swap');
        :root { --gold: #d4af37; --bg: #050505; --text: #e0e0e0; --alert: #ff4444; }
        body { background: var(--bg); color: var(--text); font-family: 'Noto Serif SC', serif; margin: 0; display: flex; justify-content: center; overflow-x: hidden; }
        .terminal { width: 95%; max-width: 1100px; padding: 30px 0; }
        
        /* 头部与交互区 */
        header { border-bottom: 1px solid var(--gold); padding-bottom: 20px; text-align: center; }
        header h1 { letter-spacing: 10px; color: var(--gold); font-size: 28px; margin: 0; }
        .control-panel { background: rgba(212,175,55,0.08); margin: 20px 0; padding: 20px; display: flex; gap: 20px; justify-content: center; align-items: flex-end; border: 1px solid rgba(212,175,55,0.2); }
        .input-group { display: flex; flex-direction: column; gap: 5px; }
        .input-group label { font-size: 12px; color: var(--gold); }
        select, button { background: #111; border: 1px solid var(--gold); color: var(--gold); padding: 8px 15px; font-family: inherit; cursor: pointer; }
        button:hover { background: var(--gold); color: #000; }

        /* 12宫星盘布局 */
        .ziwei-grid { display: grid; grid-template-columns: repeat(4, 1fr); grid-template-rows: repeat(4, 1fr); gap: 5px; aspect-ratio: 1/1; margin: 20px 0; }
        .palace { border: 0.5px solid rgba(212,175,55,0.2); position: relative; padding: 10px; background: rgba(255,255,255,0.01); transition: all 0.5s; }
        .palace.center { grid-area: 2 / 2 / 4 / 4; display: flex; flex-direction: column; align-items: center; justify-content: center; border: 1px solid var(--gold); }
        .palace-name { position: absolute; bottom: 5px; right: 5px; font-size: 12px; color: var(--gold); opacity: 0.7; }
        .star-main { writing-mode: vertical-rl; font-size: 18px; font-weight: 900; color: var(--gold); height: 60%; }
        .star-si-hua { color: var(--alert); border: 1px solid var(--alert); font-size: 10px; padding: 1px; margin-top: 5px; }
        
        /* 深度审计卡片 */
        .analysis-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .card { border-left: 3px solid var(--gold); background: rgba(212,175,55,0.05); padding: 20px; min-height: 120px; }
        .card h3 { color: var(--gold); margin: 0 0 15px 0; font-size: 18px; border-bottom: 1px solid rgba(212,175,55,0.2); }
        
        #sys-log { font-family: monospace; font-size: 12px; color: #888; margin-top: 10px; text-align: center; }
        .active-palace { background: rgba(212,175,55,0.15) !important; box-shadow: inset 0 0 15px rgba(212,175,55,0.2); }
    </style>
</head>
<body>
    <div class="terminal">
        <header>
            <h1>生命終端 · 智算核心 2.0</h1>
            <div id="sys-log">>> 核心算法已加载：[紫微斗数-飞星引擎]</div>
        </header>

        <section class="control-panel">
            <div class="input-group">
                <label>出生年干</label>
                <select id="year-stem">
                    <option value="庚">庚 (1990/2000)</option>
                    <option value="丙">丙 (1996/2006)</option>
                    <option value="壬">壬 (1992/2012)</option>
                </select>
            </div>
            <div class="input-group">
                <label>出生时辰</label>
                <select id="birth-hour">
                    <option value="0">子时 (命宫在寅)</option>
                    <option value="2">寅时 (命宫在辰)</option>
                    <option value="6">午时 (命宫在申)</option>
                </select>
            </div>
            <button onclick="runAudit()">启动实时深度审计</button>
        </section>

        <div class="ziwei-grid" id="grid">
            </div>

        <div class="analysis-grid">
            <div class="card">
                <h3>流年/命盘联动解析</h3>
                <div id="logic-text">请选择生辰并启动审计...</div>
            </div>
            <div class="card">
                <h3>赛博生命建议</h3>
                <div id="advice-text">等待数据对齐...</div>
            </div>
        </div>
    </div>

    <script>
        const palaces = ["寅", "卯", "辰", "巳", "午", "未", "申", "酉", "戌", "亥", "子", "丑"];
        const palaceNames = ["父母", "命宫", "兄弟", "夫妻", "子女", "财帛", "疾厄", "迁移", "奴仆", "官禄", "田宅", "福德"];

        function initGrid() {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            // 简单排列 12 宫位（逆时针或顺时针逻辑简化版）
            const layoutOrder = [10, 11, 0, 1, 9, -1, -1, 2, 8, -1, -1, 3, 7, 6, 5, 4]; // 模拟 4x4 边缘排列
            
            layoutOrder.forEach((idx, i) => {
                const div = document.createElement('div');
                if (idx === -1) {
                    if (i === 5) {
                        div.className = 'palace center';
                        div.innerHTML = '<div style="color:var(--gold);text-align:center">CORE<br>ENGINE</div>';
                    } else {
                        div.style.visibility = 'hidden';
                    }
                } else {
                    div.className = 'palace';
                    div.id = `palace-${idx}`;
                    div.innerHTML = `<span class="palace-name">${palaces[idx]} · ${palaceNames[idx]}</span><div class="star-area"></div>`;
                }
                grid.appendChild(div);
            });
        }

        async function runAudit() {
            const stem = document.getElementById('year-stem').value;
            const hour = document.getElementById('birth-hour').value;
            
            // 模拟专业逻辑：四化计算
            let sihau = "";
            let targetPalace = "";
            let advice = "";

            if (stem === "丙") {
                sihau = "天机化忌";
                targetPalace = "官禄";
                advice = "检测到【天机化忌】入官禄。2026丙午年，程序员磁场极度不稳定。强烈建议：锁定主分支代码，拒绝任何非必要重构，谨防逻辑崩坏。";
            } else if (stem === "庚") {
                sihau = "天同化忌";
                targetPalace = "福德";
                advice = "天同化忌入福德。心理压力与系统冗余成正比。建议：强制休假，或进行低强度文档编写，避免高并发逻辑作业。";
            }

            // 更新 UI
            document.querySelectorAll('.palace').forEach(p => p.classList.remove('active-palace'));
            document.getElementById('logic-text').innerHTML = `<b>当前触发：</b> ${sihau}<br><b>受冲击宫位：</b> ${targetPalace}宫<br><b>时空坐标：</b> ${stem}年${hour}时`;
            document.getElementById('advice-text').innerHTML = advice;

            // 视觉反馈：点亮对应宫位
            const targetId = stem === "丙" ? "palace-9" : "palace-5"; 
            document.getElementById(targetId).classList.add('active-palace');
            document.getElementById(targetId).querySelector('.star-area').innerHTML = `<div class="star-main">${sihau.substring(0,2)}<span class="star-si-hua">${sihau.substring(2)}</span></div>`;
        }

        window.onload = initGrid;
    </script>
</body>
</html>
