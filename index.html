<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>TERMINAL 16.0 | 全息命理终端 v2.0</title>
    <style>
        :root {
            --bg: #0a0a0a;
            --gold: #d4af37;
            --gold-dim: rgba(212, 175, 55, 0.2);
            --ji-red: #c93636;
            --lu-green: #7fbf7f;
            --quan-blue: #4a90e2;
            --ke-white: #e0e0e0;
            --panel-bg: rgba(10, 10, 10, 0.85);
            --border-color: #222;
        }

        body { background: var(--bg); color: #ccc; font-family: "Microsoft YaHei", sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; overflow-x: hidden; }

        /* --- 顶部控制区 --- */
        .top-bar {
            width: 100%; padding: 20px; background: rgba(0,0,0,0.9); border-bottom: 1px solid var(--gold-dim);
            display: flex; justify-content: center; gap: 12px; align-items: center; z-index: 100; box-shadow: 0 2px 20px rgba(0,0,0,0.8);
        }
        select, button {
            background: #111; border: 1px solid var(--gold-dim); color: var(--gold);
            padding: 8px 15px; font-size: 14px; cursor: pointer; outline: none; transition: 0.3s;
        }
        select:focus { border-color: var(--gold); box-shadow: 0 0 10px var(--gold-dim); }
        button { background: rgba(212, 175, 55, 0.1); font-weight: bold; padding: 8px 25px; letter-spacing: 2px; }
        button:hover { background: var(--gold); color: #000; box-shadow: 0 0 20px var(--gold); }
        button:disabled { opacity: 0.5; cursor: not-allowed; }

        .layout-container { display: grid; grid-template-columns: 880px 400px; gap: 35px; padding: 40px; }

        /* --- 地盘网格 (底层网格规范) --- */
        .chart-grid {
            display: grid; grid-template-columns: repeat(4, 220px); grid-template-rows: repeat(4, 220px);
            gap: 1px; background: var(--border-color); position: relative;
        }

        .palace {
            background: var(--bg); position: relative; padding: 15px; box-sizing: border-box;
            /* 初始状态：5%-8% 透明度，暗金微光 */
            opacity: 0.08; transition: opacity 0.5s ease-out, box-shadow 0.5s;
            box-shadow: inset 0 0 10px rgba(212,175,55,0.05);
        }
        .palace.active { opacity: 1; box-shadow: inset 0 0 20px rgba(212,175,55,0.1); border: 1px solid var(--gold-dim); }

        .p-name-bg { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 24px; font-weight: bold; color: var(--gold); opacity: 0.2; letter-spacing: 5px; }
        
        /* --- 星曜飞布动画 (用户规范) --- */
        @keyframes starLand {
            0% { opacity: 0; transform: scale(0.5) translateY(-30px); filter: blur(8px); }
            60% { transform: scale(1.2) translateY(0); filter: blur(0); }
            100% { opacity: 1; transform: scale(1) translateY(0); text-shadow: 0 0 10px rgba(212, 175, 55, 0.6); }
        }

        .star-container { display: flex; flex-direction: row-reverse; gap: 10px; height: 130px; margin-top: 25px; position: relative; z-index: 2; }
        .main-star { 
            writing-mode: vertical-rl; font-size: 22px; font-weight: bold; color: #eee; letter-spacing: 3px;
            opacity: 0; /* 初始隐藏，等待动画 */
        }
        /* 统一四化配色规范 */
        .hua-marker { position: absolute; bottom: -18px; left: 50%; transform: translateX(-50%); font-size: 10px; padding: 2px; border-radius: 2px; writing-mode: horizontal-tb; font-weight: normal; text-shadow: none; color: #fff;}
        .hua-lu .hua-marker { background: var(--lu-green); }
        .hua-quan .hua-marker { background: var(--quan-blue); }
        .hua-ke .hua-marker { background: var(--ke-white); color: #000; }
        .hua-ji { color: #ff9999; }
        .hua-ji .hua-marker { background: var(--ji-red); box-shadow: 0 0 8px var(--ji-red); }

        /* 其他宫位细节 */
        .p-gan { position: absolute; top: 10px; left: 10px; color: var(--gold); font-weight: bold; font-size: 16px; opacity:0; transition: 0.5s; }
        .p-branch { position: absolute; bottom: 10px; right: 10px; font-size: 12px; color: #555; opacity:0; transition: 0.5s; }
        .palace.active .p-gan, .palace.active .p-branch { opacity: 1; }

        /* --- 中心核心区 (全息预热) --- */
        .center-hub {
            grid-area: 2 / 2 / 4 / 4; position: relative; display: flex; justify-content: center; align-items: center;
            overflow: hidden; background: radial-gradient(circle at center, rgba(212,175,55,0.05) 0%, transparent 70%);
        }

        /* 1. 八卦核心组件 */
        #bagua-core { width: 300px; height: 300px; transition: all 0.5s; transform-origin: center; }
        .taiji { transform-origin: center; animation: spin 20s linear infinite; }
        .taiji.male { animation-direction: normal; } /* 顺时针 */
        .taiji.female { animation-direction: reverse; } /* 逆时针 */
        .taiji.fast { animation-duration: 2s; filter: drop-shadow(0 0 15px var(--gold)); }
        
        .ring-text { font-family: "Microsoft YaHei"; fill: var(--gold); font-size: 14px; font-weight: bold; letter-spacing: 2px; }
        .bagua-symbols { fill: rgba(212,175,55,0.3); font-size: 20px; transform-origin: center; animation: spin 40s linear infinite reverse; }
        .bagua-symbols.fast { animation-duration: 3s; fill: var(--gold); filter: drop-shadow(0 0 10px var(--gold)); }

        @keyframes spin { 100% { transform: rotate(360deg); } }

        .status-text { position: absolute; bottom: 20px; font-family: monospace; color: var(--gold); font-size: 12px; opacity: 0.7; }

        /* 2. 悬浮玻璃卡片 (排盘后显示) */
        .info-card {
            position: absolute; width: 80%; height: 80%;
            background: rgba(10, 10, 10, 0.6); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(212, 175, 55, 0.3); box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            opacity: 0; pointer-events: none; transition: 0.8s; transform: scale(0.9); z-index: 10;
        }
        .info-card.visible { opacity: 1; pointer-events: auto; transform: scale(1); }
        .info-card h2 { color: var(--gold); letter-spacing: 6px; margin-bottom: 20px; text-shadow: 0 0 10px var(--gold-dim); }
        .bazi-display { display: flex; gap: 20px; font-size: 18px; font-weight: bold; color: #fff; margin-bottom: 20px; padding: 10px 20px; border-bottom: 1px solid var(--gold-dim); }
        .meta-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; font-size: 14px; color: #aaa; text-align: center; }
        .meta-grid span { color: var(--gold); font-weight: bold; }

        /* --- 右侧面板 (纯黑背景 + 内发光) --- */
        .sidebar { display: flex; flex-direction: column; gap: 25px; }
        .panel { 
            background: #050505; border: 1px solid var(--border-color); padding: 25px; 
            box-shadow: inset 0 0 30px rgba(212,175,55,0.03); position: relative;
        }
        .panel::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 2px; background: linear-gradient(90deg, transparent, var(--gold), transparent); opacity: 0.5; }
        .panel h3 { margin: 0 0 15px 0; color: var(--gold); font-size: 18px; letter-spacing: 2px; }
        
        .term-box { font-family: monospace; font-size: 14px; line-height: 1.8; color: #bbb; min-height: 150px; }
        /* 关键词高亮 */
        .highlight { color: var(--gold); font-weight: bold; text-shadow: 0 0 5px rgba(212,175,55,0.4); }
        .highlight.danger { color: var(--ji-red); text-shadow: 0 0 5px rgba(201,54,54,0.4); }
        
        /* Overlay 遮罩 */
        #deploy-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85);
            z-index: 50; opacity: 0; pointer-events: none; transition: opacity 0.3s;
        }
    </style>
</head>
<body>

<div id="deploy-overlay"></div>

<div class="top-bar">
    <select id="gender" onchange="triggerCoreReaction()"><option value="1">乾造 (男)</option><option value="0">坤造 (女)</option></select>
    <select id="ySel" onchange="triggerCoreReaction()"></select>
    <select id="mSel" onchange="triggerCoreReaction()"></select>
    <select id="dSel" onchange="triggerCoreReaction()"></select>
    <select id="hSel" onchange="triggerCoreReaction()"></select>
    <button id="btnDeploy" onclick="executeDeployment()">布阵排盘</button>
</div>

<div class="layout-container">
    <div class="chart-grid" id="mainGrid">
        <div class="center-hub" id="centerHub">
            <svg id="bagua-core" viewBox="0 0 200 200">
                <circle cx="100" cy="100" r="90" fill="none" stroke="rgba(212,175,55,0.1)" stroke-width="1"/>
                
                <g class="bagua-symbols" id="bagua-ring">
                    <text x="100" y="25" text-anchor="middle">☰</text>
                    <text x="153" y="47" text-anchor="middle">☱</text>
                    <text x="175" y="105" text-anchor="middle">☲</text>
                    <text x="153" y="163" text-anchor="middle">☳</text>
                    <text x="100" y="185" text-anchor="middle">☴</text>
                    <text x="47" y="163" text-anchor="middle">☵</text>
                    <text x="25" y="105" text-anchor="middle">☶</text>
                    <text x="47" y="47" text-anchor="middle">☷</text>
                </g>

                <g class="ring-text">
                    <text x="100" y="45" text-anchor="middle" id="svg-year">壬寅</text>
                    <text x="155" y="105" text-anchor="middle" id="svg-month">丁未</text>
                    <text x="100" y="165" text-anchor="middle" id="svg-day">庚子</text>
                    <text x="45" y="105" text-anchor="middle" id="svg-hour">丙戌</text>
                </g>

                <g class="taiji male" id="taiji-core" transform="translate(100, 100) scale(0.4)">
                    <path d="M0 -50 A50 50 0 0 1 0 50 A25 25 0 0 0 0 0 A25 25 0 0 1 0 -50" fill="#d4af37"/>
                    <path d="M0 -50 A50 50 0 0 0 0 50 A25 25 0 0 0 0 0 A25 25 0 0 1 0 -50" fill="#0a0a0a" stroke="#d4af37" stroke-width="1"/>
                    <circle cx="0" cy="-25" r="8" fill="#0a0a0a"/>
                    <circle cx="0" cy="25" r="8" fill="#d4af37"/>
                </g>
            </svg>

            <div class="status-text" id="core-status">> 系统就绪... 等待生辰注入 _</div>

            <div class="info-card" id="infoCard">
                <h2>命理终端</h2>
                <div class="bazi-display" id="card-bazi">壬寅 丁未 庚子 丙戌</div>
                <div class="meta-grid">
                    <div>命宫：<span id="card-ming">--</span></div>
                    <div>身宫：<span id="card-shen">--</span></div>
                    <div>五行局：<span id="card-ju">--</span></div>
                    <div>真太阳时：<span>+14分钟</span></div>
                </div>
            </div>
        </div>
    </div>

    <div class="sidebar">
        <div class="panel">
            <h3>命盘全析</h3>
            <div class="term-box" id="res-full">> 暂无数据。</div>
        </div>
        <div class="panel">
            <h3>大限详析</h3>
            <div class="term-box" id="res-limit">> 暂无数据。</div>
        </div>
    </div>
</div>

<script>
    // 1. 初始化下拉框
    const ySel = document.getElementById('ySel');
    const mSel = document.getElementById('mSel');
    const dSel = document.getElementById('dSel');
    const hSel = document.getElementById('hSel');
    for(let i=1970; i<=2030; i++) ySel.options.add(new Option(`${i}年`, i));
    for(let i=1; i<=12; i++) mSel.options.add(new Option(`${i}月`, i));
    for(let i=1; i<=30; i++) dSel.options.add(new Option(`${i}日`, i));
    const hours = ["子","丑","寅","卯","辰","巳","午","未","申","酉","戌","亥"];
    hours.forEach(h => hSel.options.add(new Option(`${h}时`, h)));

    const gridLayout = ["4/1", "4/2", "4/3", "4/4", "3/4", "2/4", "1/4", "1/3", "1/2", "1/1", "2/1", "3/1"];
    const palaceNames = ["命宫","兄弟","夫妻","子女","财帛","疾厄","迁移","奴仆","官禄","田宅","福德","父母"];

    // 核心数据生成器 (模拟不同八字产生不同排盘，解决“无变化”Bug)
    function generatePalaceData() {
        // 根据年份下拉框的 index 做一个简单的偏移，模拟重新排盘的数据变化
        const offset = ySel.selectedIndex % 12; 
        const data = [];
        const stars = [
            { main: ["紫微"], hua: "quan" }, { main: ["天机"], hua: "lu" }, { main: ["破军"], hua: "" },
            { main: ["太阳"], hua: "" }, { main: ["武曲","天府"], hua: "ke" }, { main: ["天同"], hua: "" },
            { main: ["七杀"], hua: "" }, { main: ["天梁"], hua: "" }, { main: ["廉贞","贪狼"], hua: "ji" },
            { main: ["巨门"], hua: "" }, { main: ["天相"], hua: "" }, { main: ["无主星"], hua: "" }
        ];
        
        for(let i=0; i<12; i++) {
            const starIdx = (i + offset) % 12;
            const pNameIdx = (i + Math.floor(offset/2)) % 12;
            data.push({
                name: palaceNames[pNameIdx],
                gan: ["甲","乙","丙","丁","戊","己","庚","辛","壬","癸"][i%10],
                branch: hours[i],
                main: stars[starIdx].main,
                hua: stars[starIdx].hua
            });
        }
        return data;
    }
// 1. 这里的 dictionary 是你的专业知识库，可以无限扩充
const dictionary = {
    stars: {
        "紫微": "具备领导潜质，格局宏大，但需防孤军奋战。",
        "天机": "思维敏捷，具谋略之才，但心思过重易焦虑。",
        "太阳": "志向高远，处事公正，利于名声传播。",
        "廉贞": "性格刚硬，带有傲气，感情与事业易生极端波动。",
        "七杀": "将星入命，具备极强的开创力与执行力，宜武不宜文。",
        "破军": "不破不立，人生多变动，是典型的开拓者。",
        "无主星": "性格随和但也易受外界影响，借对宫之星曜为用。"
    },
    hua: {
        "lu": "主一生财源顺遂，处事圆融。",
        "quan": "主权力欲望与掌控力，利于升迁。",
        "ke": "主名声与贵人相助，考试及文书运佳。",
        "ji": "主阻碍与亏欠，是需要一生去修行的功课。"
    }
};

// 2. 这里的函数就是“推演引擎”，它负责根据排盘数据拼凑文案
function generateProfessionalInsight(data) {
    const mingPalace = data.find(p => p.name === "命宫");
    const mainStar = mingPalace.main[0]; 
    const hua = mingPalace.hua;         

    let insight = `观其之命宫，坐${mainStar}。`;
    
    // 基础性格判定
    insight += dictionary.stars[mainStar] || "命格清奇，具备独特之天赋。";
    
    // 四化逻辑注入
    if (hua && dictionary.hua[hua]) {
        insight += `<br><br><span class='highlight'>[四化加持]</span> ${dictionary.hua[hua]}`;
    }

    // 宫位环境判定
    insight += `<br><br>身处${mingPalace.branch}宫，`;
    if (["子", "午", "卯", "酉"].includes(mingPalace.branch)) {
        insight += "此乃“四败之地”，主情感波动较多。";
    } else {
        insight += "地势稳健，利于中晚年扎根。";
    }

    return insight;
}
    // 2. 初始化底层网格 (5%透明度预热)
    function initEmptyGrid() {
        const grid = document.getElementById('mainGrid');
        // 清理旧宫位（保留 centerHub）
        Array.from(grid.children).forEach(el => {
            if(el.id !== 'centerHub') el.remove();
        });

        for(let i=0; i<12; i++) {
            const p = document.createElement('div');
            p.className = 'palace';
            p.style.gridArea = gridLayout[i];
            p.id = `palace-${i}`;
            p.innerHTML = `<div class="p-name-bg">${palaceNames[i]}</div>`;
            grid.appendChild(p);
        }
    }

    // 3. 联动反馈：修改选项时核心加速
    let reactionTimer;
    function triggerCoreReaction() {
        const taiji = document.getElementById('taiji-core');
        const bagua = document.getElementById('bagua-ring');
        const gender = document.getElementById('gender').value;
        const statusText = document.getElementById('core-status');
        
        taiji.className = `taiji fast ${gender === '1' ? 'male' : 'female'}`;
        bagua.classList.add('fast');
        statusText.innerText = "> 参数注入中... 实时演算 _";

        // 更新 SVG 上的四柱 (模拟)
        const tGan = ["甲","乙","丙","丁","戊","己","庚","辛","壬","癸"];
        document.getElementById('svg-year').innerText = tGan[ySel.selectedIndex%10] + "年";

        clearTimeout(reactionTimer);
        reactionTimer = setTimeout(() => {
            taiji.className = `taiji ${gender === '1' ? 'male' : 'female'}`;
            bagua.classList.remove('fast');
            statusText.innerText = "> 参数锁定... 待命 _";
        }, 1000);
    }

    // 4. 执行部署动画 (四阶段)
    function executeDeployment() {
        const btn = document.getElementById('btnDeploy');
        btn.disabled = true;
        const overlay = document.getElementById('deploy-overlay');
        const baguaCore = document.getElementById('bagua-core');
        const infoCard = document.getElementById('infoCard');
        const statusText = document.getElementById('core-status');
        
        const data = generatePalaceData();

        // 【重置状态】解决重排无变化的问题
        infoCard.classList.remove('visible');
        baguaCore.style.opacity = '1';
        baguaCore.style.transform = 'scale(1)';
        document.getElementById('res-full').innerHTML = "";
        document.getElementById('res-limit').innerHTML = "";
        initEmptyGrid(); // 重新生成空 DOM

        // Phase 1: 引擎启动 (0.0s)
        statusText.innerText = "> SYSTEM LOCKING...";
        overlay.style.opacity = '1';
        baguaCore.style.filter = 'drop-shadow(0 0 30px #d4af37)';
        
        setTimeout(() => {
            // Phase 2: 星图展开 & 核心炸裂 (0.5s)
            overlay.style.opacity = '0';
            baguaCore.style.transform = 'scale(2)';
            baguaCore.style.opacity = '0';
            statusText.style.display = 'none';

            data.forEach((d, i) => {
                const p = document.getElementById(`palace-${i}`);
                p.classList.add('active'); // 网格变亮
                
                // 准备注入星曜内容
                let sHTML = '';
                d.main.forEach(s => {
                    let huaHTML = '';
                    let cClass = '';
                    if(d.hua) {
                        cClass = `hua-${d.hua}`;
                        const huaMap = { lu: '禄', quan: '权', ke: '科', ji: '忌' };
                        huaHTML = `<div class="hua-marker">${huaMap[d.hua]}</div>`;
                    }
                    // 添加星曜元素，注入 animation CSS 和 delay
                    sHTML += `<div class="main-star ${cClass}" style="animation: starLand 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; animation-delay: ${1.2 + (i*0.05)}s;">${s}${huaHTML}</div>`;
                });

                p.innerHTML = `
                    <div class="p-gan">${d.gan}</div>
                    <div class="p-branch">${d.branch}</div>
                    <div class="star-container">${sHTML}</div>
                    <div class="p-name-bg" style="font-size:14px; opacity:0.5; bottom:10px; top:auto; transform:translateX(-50%);">${d.name}</div>
                `;
            });
        }, 500);

        setTimeout(() => {
            // Phase 3 结束，切换中心卡片 (2.0s)
          setTimeout(() => {
            // 这里我们只需要找到命宫，暂时把局数写成动态显示的占位符
            const mingPalace = data.find(x => x.name === '命宫');
            document.getElementById('card-ming').innerText = mingPalace.branch + "宫";
            
            // 以后这里可以根据逻辑计算具体的局数，现在先让他动起来
            const juList = ["金四局", "木三局", "水二局", "火六局", "土五局"];
            document.getElementById('card-ju').innerText = juList[ySel.selectedIndex % 5];
            
            infoCard.classList.add('visible');
        }, 2000);
            // Phase 4: 数据解析 打字机 (2.5s)
           setTimeout(() => {
            btn.disabled = false;
            
            // 【关键改动】：调用引擎生成独一无二的文案
            const dynamicText = generateProfessionalInsight(data);
            
            typeWriter("res-full", `> [实时推演完毕]<br><br>${dynamicText}`);
            typeWriter("res-limit", "> [十年轨道推演]<br><br>当前大限波动正常，时空轨迹已锁定。");
        }, 2500);

    // 打字机效果解析器 (支持 HTML 标签)
    function typeWriter(elementId, text) {
        const el = document.getElementById(elementId);
        el.innerHTML = "";
        let i = 0;
        let isTag = false;
        let currentHTML = "";

        const timer = setInterval(() => {
            if (i >= text.length) {
                clearInterval(timer);
                return;
            }
            const char = text.charAt(i);
            if (char === '<') isTag = true;
            
            currentHTML += char;
            el.innerHTML = currentHTML + (isTag ? "" : "_");
            
            if (char === '>') isTag = false;
            i++;
        }, 30);
    }

    window.onload = initEmptyGrid;
</script>
</body>
</html>
