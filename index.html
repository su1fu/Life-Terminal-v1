<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>生命终端 | 2026 磁场审计</title>
    <style>
        :root { --green: #00ff41; --bg: #050505; --danger: #ff3131; }
        body { background: var(--bg); color: var(--green); font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif; padding: 20px; line-height: 1.6; }
        .terminal { max-width: 600px; margin: 0 auto; border: 1px solid var(--green); padding: 25px; box-shadow: 0 0 20px rgba(0, 255, 65, 0.2); }
        h2 { border-bottom: 2px solid var(--green); padding-bottom: 10px; font-weight: normal; letter-spacing: 2px; }
        .form-group { margin: 25px 0; }
        label { display: block; margin-bottom: 10px; font-size: 14px; opacity: 0.8; }
        select { background: #000; color: var(--green); border: 1px solid var(--green); padding: 12px; width: 100%; font-size: 16px; outline: none; }
        button { background: var(--green); color: #000; border: none; padding: 15px; width: 100%; font-weight: bold; font-size: 16px; cursor: pointer; margin-top: 10px; }
        button:hover { background: #fff; box-shadow: 0 0 15px #fff; }
        
        /* 结果展示区 */
        #result { display: none; margin-top: 30px; border-top: 1px dashed var(--green); padding-top: 20px; }
        .palace-tag { display: inline-block; border: 1px solid var(--green); padding: 2px 8px; margin-right: 10px; font-size: 12px; }
        .analysis-box { background: rgba(0, 255, 65, 0.05); border-left: 4px solid var(--green); padding: 15px; margin: 15px 0; }
        .warning { color: var(--danger); font-weight: bold; border: 1px solid var(--danger); padding: 10px; }
    </style>
</head>
<body>

<div class="terminal">
    <h2>生命终端 · 2026 审计</h2>
    
    <div class="form-group">
        <label>● 输入观测维度：农历月份</label>
        <select id="month">
            <option value="1">正月</option><option value="2">二月</option><option value="3">三月</option>
            <option value="4">四月</option><option value="5">五月</option><option value="6">六月</option>
            <option value="7">七月</option><option value="8">八月</option><option value="9">九月</option>
            <option value="10">十月</option><option value="11">十一月</option><option value="12">腊月</option>
        </select>
    </div>

    <div class="form-group">
        <label>● 输入观测维度：出生时辰</label>
        <select id="hour">
            <option value="0">寅时 (03-05)</option><option value="1">卯时 (05-07)</option>
            <option value="2">辰时 (07-09)</option><option value="3">巳时 (09-11)</option>
            <option value="4">午时 (11-13)</option><option value="5">未时 (13-15)</option>
            <option value="6">申时 (15-17)</option><option value="7">酉时 (17-19)</option>
            <option value="8">戌时 (19-21)</option><option value="9">亥时 (21-23)</option>
            <option value="10">子时 (23-01)</option><option value="11">丑时 (01-03)</option>
        </select>
    </div>

    <button onclick="calculate()">执行 2026 风险审计</button>

    <div id="result">
        <div><span class="palace-tag">命宫坐标</span> <span id="life-pos">--</span></div>
        <div class="analysis-box">
            <b style="color: #fff;">>> 专业解析建议：</b><br>
            <span id="analysis-text"></span>
        </div>
        <div id="danger-zone" class="warning" style="display:none;">
            🚨 核心预警：[天机化忌] 正在冲击你的官禄磁场。
        </div>
    </div>
</div>

<script>
    const branches = ["寅", "卯", "辰", "巳", "午", "未", "申", "酉", "戌", "亥", "子", "丑"];

    function calculate() {
        const m = parseInt(document.getElementById('month').value);
        const h = parseInt(document.getElementById('hour').value);
        
        // 核心排盘算法：寅宫起正月，顺数月，逆数时
        const lifeIdx = (m - 1 - h + 12) % 12;
        document.getElementById('life-pos').textContent = branches[lifeIdx] + "宫";

        let text = "根据 2026 丙午流年测算：天同化禄、天机化忌。";
        
        // 专业断语逻辑
        if (lifeIdx === 6) { // 申宫
            text += "今年命宫与流年磁场对冲，变动极大。建议保持低频操作。";
        } else {
            text += "命主磁场尚稳，但需注意技术逻辑的连贯性。";
        }
        
        text += " 针对程序员职业：天机化忌入流年官禄。这意味着你现在的代码重构计划存在严重逻辑死循环风险。";

        document.getElementById('analysis-text').textContent = text;
        document.getElementById('result').style.display = 'block';
        document.getElementById('danger-zone').style.display = 'block';
    }
</script>

</body>
</html>
