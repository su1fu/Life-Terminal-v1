<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LIFE TERMINAL v3.0 | 终编</title>
    <style>
        /* 引入具有高级感的衬线字体逻辑 */
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@200;700&display=swap');

        :root {
            --neon-green: #00ff41;
            --soft-glow: rgba(0, 255, 65, 0.4);
            --dark-bg: #050505;
            --panel-bg: rgba(255, 255, 255, 0.02);
            --warning-red: #ff3131;
        }

        body {
            background-color: var(--dark-bg);
            color: var(--neon-green);
            /* 使用 Noto Serif SC 营造古籍刻本的高级感 */
            font-family: 'Noto Serif SC', 'Source Han Serif SC', 'Songti SC', serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            letter-spacing: 1px;
        }

        /* 氛围感蒙层：噪点与扫描线 */
        body::after {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: repeating-linear-gradient(0deg, rgba(0,0,0,0.1), rgba(0,0,0,0.1) 1px, transparent 1px, transparent 2px);
            pointer-events: none;
            z-index: 999;
        }

        .main-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(4, 1fr);
            gap: 15px;
            padding: 30px;
            height: 75vh;
        }

        .palace {
            background: var(--panel-bg);
            border: 0.5px solid rgba(0, 255, 65, 0.3);
            padding: 12px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: relative;
            transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .palace:hover {
            background: rgba(0, 255, 65, 0.08);
            border-color: var(--neon-green);
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.1);
        }

        .palace-header {
