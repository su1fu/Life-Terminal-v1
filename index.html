<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>TERMINAL 7.0 | 終極命理智算中心</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;900&family=Share+Tech+Mono&display=swap');
        
        :root {
            --gold: #d4af37; --bg: #020202; --panel: #0a0a0a; --accent: #00f3ff;
            --lu: #4caf50; --quan: #2196f3; --ke: #9c27b0; --ji: #f44336;
        }

        body { background: var(--bg); color: #eee; font-family: 'Noto Serif SC', serif; margin: 0; display: flex; flex-direction: column; align-items: center; overflow-x: hidden; }

        /* 扫描线动画 */
        body::before {
            content: " "; position: fixed; top: 0; left: 0; width: 100%; height: 2px;
            background: rgba(0, 243, 255, 0.1); z-index: 100; pointer-events: none;
            animation: scanning 4s linear infinite;
        }
        @keyframes scanning { 0% { top: 0; } 100% { top: 100%; } }

        /* 控制区 */
        .controls { background: var(--panel); width: 100%; padding: 15px; display: flex; justify-content: center; gap: 15px; border-bottom: 1px solid #333; z-index: 10; }
        select, button { background: #111; border: 1px solid var(--gold); color: var(--gold); padding: 8px 15px; font-family: 'Share Tech Mono', monospace; cursor: pointer; }
        button:hover { background: var(--gold); color: #000; box-shadow: 0 0 20px var(--gold); }

        /* 盘面架构 */
        .master-container { display: grid; grid-template-columns: 900px 400px; gap: 20px; padding: 20px; animation: fadeIn 1.5s ease; }
        .chart-grid { display: grid; grid-template-columns: repeat(4, 1fr); grid-template-rows: repeat(4, 1fr); gap: 5px; background: #1a1a1a; padding: 5px; border: 1px solid #444; position: relative; }

        /* 宫位细节 */
        .palace {
            background: #050505; border: 1px solid #222; padding: 10px; position: relative;
            display: flex; flex-direction: column; transition: all 0.4s; min-height: 200px;
        }
        .palace:hover { border-color: var(--accent); background: #080808; transform: scale(1.02); z-index: 5; }

        /* 星曜排布 */
        .star-container { display: flex; flex-direction: row-reverse; gap: 8px; flex-grow: 1; }
        .major-star { writing-mode: vertical-rl; font-size: 22px; font-weight: 900; color: var(--major, var(--gold)); letter-spacing: 3px; }
        .minor-star { writing-mode: vertical-rl; font-size: 12px; color: #888; margin-top: 10px; }

        /* 四化徽章 */
        .sihua-badge {
            display: inline-block; width: 18px; height: 18px; line-height: 18px; text-align: center;
            border-radius: 50%; font-size: 10px; font-weight: bold; color: #fff; margin-top: 5px;
        }
        .ji { background: var(--ji); box-shadow: 0 0 10px var(--ji); }
        .lu { background: var(--lu); }

        /* 宫位元数据 (天干地支/年龄) */
        .meta-top { position: absolute; top: 5px; right: 8px; font-size: 10px; color: #555; display: flex; flex-direction: column; align-items: flex-end; }
        .meta-bottom { position: absolute; bottom: 8px; left: 8px; right: 8px; display: flex; justify-content: space-between; border-top: 1px solid #222; padding-top: 5px; }
        .p-title { color: var(--gold); font-weight: bold; font-size: 16px; }
        .p-gz { color: #666; font-family: 'Share Tech Mono'; }

        /* 中心引擎动画 */
        .center-engine {
            grid-area: 2 / 2 / 4 / 4; background: #000; border: 1px dashed #444;
            display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; overflow: hidden;
        }
        .orb {
            position: absolute; width: 200px; height: 200px; border: 1px solid var(--accent);
            border-radius: 50%; opacity: 0.2; animation: rotate 10s linear infinite;
        }
        .orb-inner { width: 150px; height: 150px; border-style: dashed; animation: rotate-rev 15s linear infinite; }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes rotate-rev { from { transform: rotate(360deg); } to { transform: rotate(0deg); } }

        /* 解析区域 */
        .analysis-panel { display: flex; flex-direction: column; gap: 15px; }
        .card { background: var(--panel); border: 1px solid #333; padding: 20px; border-radius: 4px; }
        .card h3 { border-left: 3px solid var(--accent); padding-left: 10px; margin: 0 0 15px 0; color: var(--accent); font-size: 18px; }
        .audit-line { margin-bottom: 12px; line-height: 1.6; font-size: 14px; }
        .audit-line b { color: var(--gold); }
        .tag { background: #222; padding: 2px 6px; border-radius: 3px; font-size: 11px; margin-right: 5px; color: var(--accent); border: 0.5px solid #444; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="controls">
        <select id="birthYear"></select>
        <select id="birthMonth"></select>
        <select id="birthDay"></select>
        <select id="birthHour">
            <option value="1">子时 (23:00-01:00)</option><option value="2">丑时</option><option value="3">寅时</option>
            <option value="4">卯时</option><option value="5">辰时</option><option value="6">巳时</option>
            <option value="7">午时</option><option value="8">未时</option><option value="9">申时</option>
            <option value="10">酉时</option><option value="11">戌时</option><option value="12">亥时</option>
        </select>
        <button onclick="runUltimateAudit()">启动深层审计</button>
    </div>

    <div class="master-container">
        <div class="chart-grid" id="chartGrid">
            <div class="center-engine" id="engine">
                <div class="orb"></div>
                <div class="orb orb-inner"></div>
                <div style="z-index: 10; text-align: center;">
                    <div id="core-bazi" style="font-size: 20px; color: var(--gold); font-weight: 900; letter-spacing: 5px;">命理核心</div>
                    <div id="core-element" style="color: var(--accent); font-size: 12px; margin-top: 10px; font-family: 'Share Tech Mono';">WAITING FOR INPUT...</div>
                </div>
            </div>
            </div>

        <div class="analysis-panel">
            <div class="card">
                <h3>底层架构审计 (大白话版)</h3>
                <div id="simple-analysis">系统就绪，请输入生辰进行生命周期审计。</div>
            </div>
            <div class="card">
                <h3>技术栈运势报告</h3>
                <div id="tech-luck">
                    <div class="audit-line"><span class="tag">稳定性</span> 待测</div>
                    <div class="audit-line"><span class="tag">迭代力</span> 待测</div>
                    <div class="audit-line"><span class="tag">财富流</span> 待测</div>
                </div>
            </div>
            <div class="card" style="background: #000; border: 1px solid #444;">
                <h3 style="color: #666; font-size: 14px;">DEBUG LOG</h3>
                <div id="debug-log" style="font-family: 'Share Tech Mono'; font-size: 11px; color: #44ff44; height: 100px; overflow-y: auto;">
                    > System Kernel v7.0.2 initialized...<br>
                    > Encryption: RSA-4096 Enabled...
                </div>
            </div>
        </div>
    </div>

    <script>
        const DIZHI = ["寅", "卯", "辰", "巳", "午", "未", "申", "酉", "戌", "亥", "子", "丑"];
        const TIAN_GAN = ["甲", "乙", "丙", "丁", "戊", "己", "庚", "辛", "壬", "癸"];
        const PALACES = ["命宫", "兄弟", "夫妻", "子女", "财帛", "疾厄", "迁移", "奴仆", "官禄", "田宅", "福德", "父母"];
        
        window.onload = () => {
            const y = document.getElementById('birthYear'), m = document.getElementById('birthMonth'), d = document.getElementById('birthDay');
            for(let i=1970; i<=2025; i++) y.add(new Option(i + "年", i));
            for(let i=1; i<=12; i++) m.add(new Option(i + "月", i));
            for(let i=1; i<=30; i++) d.add(new Option(i + "日", i));
            y.value = 1996; m.value = 6; d.value = 1;
            renderBaseGrid();
        };

        function renderBaseGrid() {
            const grid = document.getElementById('chartGrid');
            const layout = ["4/1", "4/2", "4/3", "4/4", "3/4", "2/4", "1/4", "1/3", "1/2", "1/1", "2/1", "3/1"];
            DIZHI.forEach((zhi, i) => {
                const div = document.createElement('div');
                div.className = 'palace'; div.id = `palace-${i}`;
                div.style.gridArea = layout[i];
                div.innerHTML = `
                    <div class="meta-top">
                        <span id="nashen-${i}">--</span>
                        <span id="age-${i}" style="color:var(--accent)">--</span>
                    </div>
                    <div class="star-container" id="stars-${i}"></div>
                    <div class="meta-bottom">
                        <span class="p-title" id="pname-${i}">--</span>
                        <span class="p-gz" id="pgz-${i}">${zhi}</span>
                    </div>
                `;
                grid.appendChild(div);
            });
        }

        function runUltimateAudit() {
            const y = parseInt(document.getElementById('birthYear').value);
            const m = parseInt(document.getElementById('birthMonth').value);
            const d = parseInt(document.getElementById('birthDay').value);
            const h = parseInt(document.getElementById('birthHour').value);

            // 1. 计算命宫位置 (寅起顺数月，生月起逆数时)
            const mingIdx = (0 + (m - 1) - (h - 1) + 12) % 12;

            // 2. 五虎遁月算宫干
            const yearStemIdx = (y - 4) % 10;
            const startStemIdx = ((yearStemIdx % 5) * 2 + 2) % 10; 

            // 3. 解析与动画更新
            document.getElementById('debug-log').innerHTML += `> 正在对齐星图坐标...<br>> 定位命宫：${DIZHI[mingIdx]}宫<br>`;
            
            DIZHI.forEach((zhi, i) => {
                const pIdx = (mingIdx - i + 12) % 12;
                const stemIdx = (startStemIdx + i) % 10;
                
                document.getElementById(`pname-${i}`).innerText = PALACES[pIdx];
                document.getElementById(`pgz-${i}`).innerText = TIAN_GAN[stemIdx] + zhi;
                document.getElementById(`age-${i}`).innerText = `${6+i*10}-${15+i*10}`;
                
                const starBox = document.getElementById(`stars-${i}`);
                starBox.innerHTML = "";
                
                // 模拟专业排盘的主星分布感
                if(i === (y % 12)) {
                    starBox.innerHTML += `<div class="major-star">紫微<span class="sihua-badge lu">禄</span></div>`;
                    starBox.innerHTML += `<div class="minor-star">文昌</div>`;
                }
                if(i === ((y+2) % 12)) {
                    starBox.innerHTML += `<div class="major-star" style="color:#ff5555">天机<span class="sihua-badge ji">忌</span></div>`;
                    starBox.innerHTML += `<div class="minor-star">火星</div>`;
                }
                if(i === mingIdx) {
                    starBox.innerHTML += `<div class="major-star">太阳</div><div class="major-star">太阴</div>`;
                    document.getElementById(`palace-${i}`).style.boxShadow = "inset 0 0 20px rgba(0,243,255,0.2)";
                }
            });

            // 4. 大白话解析
            updateSimpleAnalysis(yearStemIdx);
            
            // 5. 更新中心枢纽
            document.getElementById('core-bazi').innerText = TIAN_GAN[yearStemIdx] + DIZHI[(y-4)%12] + " 命造";
            document.getElementById('core-element').innerText = "VULNERABILITY: LOW | ARCH: CLOUD-NATIVE";
        }

        function updateSimpleAnalysis(stemIdx) {
            const logs = [
                "<b>[架构现状]</b>：当前处于‘甲木’扩张期。代码产出极高，但要注意逻辑耦合，容易在‘官禄宫’产生冗余代码。",
                "<b>[架构现状]</b>：‘乙木’柔韧期。虽然面临频繁的需求变更，但你的系统具有极高的容错性。",
                "<b>[架构现状]</b>：‘丙火’爆发期。警告：近期由于‘天机化忌’，你的核心算法可能出现非预期死锁，建议加强单元测试。"
            ];
            document.getElementById('simple-analysis').innerHTML = logs[stemIdx % 3];
            
            document.getElementById('tech-luck').innerHTML = `
                <div class="audit-line"><span class="tag">稳定性</span> <span style="color:#44ff44">CRITICAL SAFE</span></div>
                <div class="audit-line"><span class="tag">迭代力</span> <span style="color:var(--gold)">HIGH PERFORMANCE</span></div>
                <div class="audit-line"><span class="tag">财富流</span> <span style="color:var(--accent)">CACHE HITTING...</span></div>
            `;
        }
    </script>
</body>
</html>
