<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>TERMINAL | 生命終端智算</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;900&display=swap');
        :root { --gold: #d4af37; --bg: #050505; --text: #e0e0e0; }
        body { background: var(--bg); color: var(--text); font-family: 'Noto Serif SC', serif; margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; }
        
        /* 头部：展示八字信息 */
        header { border-bottom: 1px solid var(--gold); padding-bottom: 20px; text-align: center; margin-bottom: 30px; }
        header h1 { letter-spacing: 12px; color: var(--gold); text-transform: uppercase; }
        .bazi-tag { font-size: 14px; color: var(--gold); opacity: 0.8; margin-top: 10px; }

        /* 专业星盘区 */
        .chart { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 30px; }
        .palace { border: 0.5px solid rgba(212, 175, 55, 0.3); background: rgba(255, 255, 255, 0.02); padding: 20px; position: relative; min-height: 100px; }
        .palace-name { position: absolute; bottom: 8px; right: 8px; font-size: 12px; color: var(--gold); }
        .star-main { font-size: 20px; font-weight: 900; color: var(--gold); writing-mode: vertical-rl; }
        .star-alert { color: #ff4444; border: 1px solid #ff4444; font-size: 10px; margin-right: 5px; padding: 2px; }

        /* 解析内容 */
        .analysis { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .card { border-left: 3px solid var(--gold); background: rgba(212, 175, 55, 0.05); padding: 20px; }
        .card h3 { color: var(--gold); margin-top: 0; }
        
        #loader { position: fixed; top:0; left:0; width:100%; height:100%; background:var(--bg); z-index:100; display:flex; align-items:center; justify-content:center; color:var(--gold); letter-spacing:5px; }
    </style>
</head>
<body>
    <div id="loader">SYNCHRONIZING CORE DATA...</div>
    <div class="container">
        <header>
            <h1>生命終端 · 智算</h1>
            <div id="bazi-info" class="bazi-tag">正在同步生命原型...</div>
        </header>

        <div class="chart" id="star-chart"></div>

        <div class="analysis">
            <div class="card">
                <h3>流年审计 (2026)</h3>
                <p id="liunian-text">等待数据注入...</p>
            </div>
            <div class="card">
                <h3>周期趋势报告</h3>
                <p id="dayun-text">正在从内核调取...</p>
            </div>
        </div>
    </div>

   <script>
    async function syncSystem() {
        const loader = document.getElementById('loader');
        
        // 核心修正：显式指定读取同级目录下的 data.json
        // 加入时间戳防止 GitHub Pages 缓存旧的 404 页面
        const targetPath = `./data.json?v=${new Date().getTime()}`;
        
        try {
            console.log(">> 正在尝试打通链路:", targetPath);
            const response = await fetch(targetPath);
            
            if (!response.ok) {
                throw new Error(`HTTP error! status: ${response.status}`);
            }
            
            const data = await response.json();
            
            // 填充八字与解析数据
            if(document.getElementById('bazi-display')) {
                document.getElementById('bazi-display').innerText = `【八字原型】${data.user_info.bazi} | 命格：${data.user_info.element}`;
            }
            document.getElementById('liunian-text').innerHTML = data.liunian_analysis;
            document.getElementById('dayun-text').innerHTML = data.dayun_analysis;
            
            // 渲染星盘
            if (typeof renderChart === "function") {
                renderChart(data.palace_data);
            }
            
            // 成功接通，移除加载遮罩
            loader.style.opacity = "0";
            setTimeout(() => loader.style.display = "none", 500);
            console.log(">> 链路接通成功！");

        } catch (err) {
            console.error(">> 链路接通失败:", err);
            loader.innerHTML = `>> 链路故障：请确保访问地址包含 /ui/ 且目录下存在 data.json<br><small>${err.message}</small>`;
        }
    }
    window.onload = syncSystem;
</script>
</body>
</html>
