<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>TERMINAL 15.0 | 紫微斗數智算核</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@200;900&family=Zhi+Mang+Xing&family=JetBrains+Mono:wght@100&display=swap');

        :root {
            --gold: #c6a35f; --gold-br: #ffcc66; --bg: #030303;
            --border: #1a1a1a; --ji: #d00000; --lu: #008037; --panel: rgba(15,15,15,0.95);
        }

        body { background: var(--bg); color: #888; font-family: 'Noto Serif SC', serif; margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; overflow-x: hidden; }

        /* 顶部高级控制区 */
        .top-nav {
            width: 100%; padding: 25px; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px);
            border-bottom: 1px solid #222; display: flex; justify-content: center; gap: 15px; z-index: 100;
        }
        .top-nav select, .top-nav button {
            background: #000; border: 1px solid #333; color: var(--gold); padding: 8px 18px; 
            font-size: 13px; cursor: pointer; border-radius: 2px; transition: 0.4s;
        }
        .top-nav button { background: var(--gold); color: #000; font-weight: 900; border: none; letter-spacing: 2px; }
        .top-nav button:hover { box-shadow: 0 0 25px rgba(198,163,95,0.4); transform: translateY(-1px); }

        /* 主体布局 */
        .engine-room { display: grid; grid-template-columns: 880px 420px; gap: 40px; padding: 40px; max-width: 1400px; }

        /* 命盘核心阵列 */
        .chart-matrix {
            display: grid; grid-template-columns: repeat(4, 220px); grid-template-rows: repeat(4, 220px);
            gap: 2px; background: #111; border: 1px solid #222; position: relative;
            perspective: 1000px;
        }

        .palace {
            background: var(--bg); position: relative; padding: 15px; display: flex; flex-direction: column;
            border: 0.5px solid #111; transition: 0.6s cubic-bezier(0.23, 1, 0.32, 1); opacity: 0; transform: translateZ(-100px);
        }
        .palace.active { opacity: 1; transform: translateZ(0); }
        .palace:hover { background: #080808; z-index: 10; box-shadow: inset 0 0 20px rgba(198,163,95,0.05); }

        /* 宫位像素级细节 */
        .p-dx-gan { position: absolute; top: 10px; left: 10px; font-weight: 900; color: var(--gold-br); font-size: 16px; text-shadow: 0 0 10px rgba(255,204,102,0.3); }
        .p-age { position: absolute; top: 10px; right: 10px; font-family: 'JetBrains Mono'; font-size: 10px; color: #444; }
        .p-name { position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%); font-weight: 900; color: #555; font-size: 15px; letter-spacing: 4px; }
        .p-shishen { position: absolute; bottom: 10px; left: 10px; font-size: 10px; color: #333; border: 0.5px solid #222; padding: 1px 3px; }
        .p-branch { position: absolute; bottom: 10px; right: 10px; font-family: 'JetBrains Mono'; font-size: 11px; color: #333; }

        .star-stack { display: flex; flex-direction: row-reverse; gap: 10px; height: 130px; margin-top: 20px; }
        .m-star { writing-mode: vertical-rl; font-size: 22px; font-weight: 900; color: #eee; letter-spacing: 4px; position: relative; }
        .m-star.hua-ji::after { content: '忌'; position: absolute; bottom: -15px; left: 50%; transform: translateX(-50%); background: var(--ji); color: #fff; font-size: 9px; padding: 2px; border-radius: 2px; writing-mode: horizontal-tb; }
        .s-star { writing-mode: vertical-rl; font-size: 12px; color: #666; margin-top: 15px; }

        /* 中宫核心面板 (图3深度致敬) */
        .center-panel {
            grid-area: 2 / 2 / 4 / 4; background: #000; border: 1px solid var(--gold);
            display: flex; flex-direction: column; padding: 25px; box-shadow: 0 0 50px rgba(0,0,0,1); z-index: 5;
        }
        .center-panel h2 { font-family: 'Zhi Mang Xing'; color: var(--gold); font-size: 48px; margin: 0; text-align: center; letter-spacing: 8px; }
        .core-meta { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 25px; }
        .meta-box { border: 1px solid #222; padding: 8px; text-align: center; font-size: 12px; color: var(--gold); background: rgba(198,163,95,0.03); }
        .bazi-strip { grid-column: span 2; display: flex; justify-content: space-around; background: var(--gold); color: #000; padding: 10px; font-weight: 900; font-family: 'JetBrains Mono'; margin: 15px 0; }
        
        .current-time-layer { font-size: 11px; color: var(--gold-br); text-align: center; border-top: 1px dashed #333; padding-top: 15px; opacity: 0.8; }

        /* 解析控制台 */
        .console { display: flex; flex-direction: column; gap: 25px; }
        .audit-card { background: var(--panel); border: 1px solid #222; padding: 30px; position: relative; }
        .audit-card::before { content: ""; position: absolute; left: 0; top: 0; height: 100%; width: 4px; background: var(--gold); }
        .audit-card h3 { font-family: 'Zhi Mang Xing'; font-size: 28px; color: var(--gold); margin: 0 0 20px 0; }

        .btn-group { display: flex; gap: 10px; margin-top: 20px; }
        .action-btn { flex: 1; background: transparent; border: 1px solid var(--gold); color: var(--gold); padding: 12px; cursor: pointer; font-weight: 900; transition: 0.3s; }
        .action-btn:hover { background: var(--gold); color: #000; }

        /* 动画激活 */
        @keyframes scan { 0% { opacity: 0; transform: scale(1.1); } 100% { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body>

<div class="top-nav">
    <select><option>乾造 (男)</option></select>
    <select id="ySel"></select>
    <select id="mSel"></select>
    <select id="dSel"></select>
    <select id="hSel"></select>
    <button onclick="igniteEngine()">布陣 · 排盤</button>
</div>

<div class="engine-room">
    <div class="chart-matrix" id="matrix">
        <div class="center-panel">
            <h2>命理終端</h2>
            <div style="text-align:center; font-size:10px; opacity:0.4; letter-spacing:3px;">METAPHYSICS QUANTUM CORE 2.0</div>
            <div class="core-meta">
                <div class="meta-box">命宮: 寅宮</div>
                <div class="meta-box">身宮: 午宮</div>
                <div class="meta-box">局數: 木三局</div>
                <div class="meta-box">生肖: 甲戌犬</div>
                <div class="bazi-strip"><span>甲戌</span><span>己巳</span><span>壬申</span><span>丙午</span></div>
            </div>
            <div class="current-time-layer">
                當前流年: 2026 丙午 <br>
                氣數監控: 天同化祿 / 廉貞化忌 [預警]
            </div>
        </div>
    </div>

    <div class="console">
        <div class="audit-card">
            <h3>時空審計</h3>
            <div id="log" style="font-family:'JetBrains Mono'; font-size:11px; color:#444; margin-bottom:15px;">> 等待引擎啟動...</div>
            <div id="result" style="line-height:2; font-size:15px; color:#aaa;">
                請輸入生辰並啟動“布陣”，系統將自動檢索天星坐標。
            </div>
            <div class="btn-group">
                <button class="action-btn" onclick="runAnalysis('full')">命盤全析</button>
                <button class="action-btn" onclick="runAnalysis('decade')">大限詳析</button>
            </div>
        </div>
    </div>
</div>

<script>
    // 初始化选择框
    const ySel = document.getElementById('ySel');
    for(let i=1970; i<=2030; i++) ySel.options.add(new Option(`${i}年`, i));
    // ... 其他初始化略过

    const PALACE_CONFIG = [
        { name: "命宮", gan: "丙", age: "3-12", main: ["廉貞","七殺"], sub: ["擎羊","天哭"], hua: "ji", shen: "長生" },
        { name: "兄弟", gan: "丁", age: "13-22", main: ["天梁"], sub: ["左輔","文昌"], hua: "", shen: "沐浴" },
        { name: "夫妻", gan: "戊", age: "23-32", main: ["紫微","天相"], sub: ["地空","地劫"], hua: "", shen: "冠帶" },
        { name: "子女", gan: "己", age: "33-42", main: ["天機","巨門"], sub: ["火星","天鉞"], hua: "lu", shen: "臨官" },
        { name: "財帛", gan: "庚", age: "43-52", main: ["貪狼"], sub: ["鈴星","陀羅"], hua: "", shen: "帝旺" },
        { name: "疾厄", gan: "辛", age: "54-63", main: ["太陽","太陰"], sub: ["天魁","右弼"], hua: "", shen: "衰" },
        { name: "遷移", gan: "壬", age: "64-73", main: ["武曲","天府"], sub: ["祿存","天馬"], hua: "", shen: "病" },
        { name: "奴僕", gan: "癸", age: "74-83", main: ["天同"], sub: ["文曲"], hua: "", shen: "死" },
        { name: "官祿", gan: "甲", age: "84-93", main: ["破軍"], sub: ["台輔"], hua: "", shen: "墓" },
        { name: "田宅", gan: "乙", age: "94-103", main: ["无主星"], sub: ["紅鸞","天喜"], hua: "", shen: "絕" },
        { name: "福德", gan: "丙", age: "104-113", main: ["廉貞"], sub: ["龍池","鳳閣"], hua: "", shen: "胎" },
        { name: "父母", gan: "丁", age: "114-123", main: ["巨門"], sub: ["寡宿"], hua: "", shen: "養" }
    ];

    const gridLayout = ["4/1", "4/2", "4/3", "4/4", "3/4", "2/4", "1/4", "1/3", "1/2", "1/1", "2/1", "3/1"];

    function igniteEngine() {
        const matrix = document.getElementById('matrix');
        Array.from(matrix.querySelectorAll('.palace')).forEach(p => p.remove());

        PALACE_CONFIG.forEach((d, i) => {
            const p = document.createElement('div');
            p.className = 'palace';
            p.style.gridArea = gridLayout[i];
            
            let sHTML = '';
            d.main.forEach((s, idx) => {
                const huaClass = (idx === 0 && d.hua) ? `hua-${d.hua}` : '';
                sHTML += `<div class="m-star ${huaClass}">${s}</div>`;
            });
            d.sub.forEach(s => sHTML += `<div class="s-star">${s}</div>`);

            p.innerHTML = `
                <div class="p-dx-gan">${d.gan}</div>
                <div class="p-age">${d.age}</div>
                <div class="star-stack">${sHTML}</div>
                <div class="p-name">${d.name}</div>
                <div class="p-shishen">${d.shen}</div>
                <div class="p-branch">${["寅","卯","辰","巳","午","未","申","酉","戌","亥","子","丑"][i]}</div>
            `;
            matrix.appendChild(p);
            
            // 矩阵入场动画：逐个扩散
            setTimeout(() => p.classList.add('active'), i * 50);
        });
        
        document.getElementById('log').innerHTML = "> 內核初始化完畢...<br>> 天星軌道對齊... [OK]<br>> 正在讀取 2026 流年參數...";
    }

    function runAnalysis(mode) {
        const res = document.getElementById('result');
        res.style.opacity = "0.3";
        document.getElementById('log').innerHTML += `<br>> 啟動${mode === 'full' ? '命盤全析' : '大限詳析'}模組...`;
        
        setTimeout(() => {
            res.style.opacity = "1";
            res.innerHTML = mode === 'full' ? 
                "【乾坤審計】廉貞七殺坐命，主英雄之志，亦主孤克之憂。此生如仗劍獨行，功名在乎「殺破狼」之變革，唯須防化忌之干擾，方顯明珠之色。" :
                "【週期趨勢】當前大限行至財帛位，貪狼坐守。此十載為欲望與才華之爆發期。火鈴相會，主橫發之機，然戒焦戒躁，防財多身弱之憾。";
        }, 1200);
    }
</script>
</body>
</html>
