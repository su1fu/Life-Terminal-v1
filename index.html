<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>生命终端 | 交互式紫微审计</title>
    <style>
        :root { --neon-green: #00ff41; --danger: #ff3131; --bg: #050505; }
        body { background: var(--bg); color: var(--neon-green); font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif; margin: 0; padding: 20px; line-height: 1.6; }
        .container { max-width: 600px; margin: 0 auto; border: 1px solid var(--neon-green); padding: 20px; box-shadow: 0 0 20px rgba(0, 255, 65, 0.2); }
        h1 { text-align: center; border-bottom: 2px solid var(--neon-green); padding-bottom: 10px; font-weight: 200; }
        
        /* 交互表单 */
        .input-group { margin: 20px 0; border: 1px dashed rgba(0, 255, 65, 0.3); padding: 15px; }
        label { display: block; margin-bottom: 10px; font-size: 14px; }
        select, input { background: #000; color: var(--neon-green); border: 1px solid var(--neon-green); padding: 10px; width: 100%; box-sizing: border-box; font-size: 16px; margin-bottom: 15px; }
        button { background: var(--neon-green); color: #000; border: none; padding: 15px; width: 100%; font-weight: bold; cursor: pointer; font-size: 18px; transition: 0.3s; }
        button:hover { background: #fff; box-shadow: 0 0 20px #fff; }

        /* 动态排盘区 */
        #result-area { display: none; margin-top: 30px; border-top: 2px solid var(--neon-green); padding-top: 20px; }
        .palace-info { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .box { border: 1px solid var(--neon-green); padding: 10px; text-align: center; }
        .analysis-card { background: rgba(0, 255, 65, 0.05); border-left: 5px solid var(--neon-green); padding: 15px; margin-top: 15px; }
        .highlight { color: #fff; font-weight: bold; background: var(--danger); padding: 2px 5px; }
    </style>
</head>
<body>

<div class="container">
    <h1>生命终端 · 2026 审计</h1>
    
    <div class="input-group">
        <label>选择出生农历月份</label>
        <select id="month">
            <option value="1">正月</option><option value="2">二月</option><option value="3">三月</option>
            <option value="4">四月</option><option value="5">五月</option><option value="6">六月</option>
            <option value="7">七月</option><option value="8">八月</option><option value="9">九月</option>
            <option value="10">十月</option><option value="11">十一月</option><option value="12">腊月</option>
        </select>

        <label>选择出生时辰</label>
        <select id="hour">
            <option value="0">寅时 (03:00-05:00)</option><option value="1">卯时 (05:00-07:00)</option>
            <option value="2">辰时 (07:00-09:00)</option><option value="3">巳时 (09:00-11:00)</option>
            <option value="4">午时 (11:00-13:00)</option><option value="5">未时 (13:00-15:00)</option>
            <option value="6">申时 (15:00-17:00)</option><option value="7">酉时 (17:00-19:00)</option>
            <option value="8">戌时 (19:00-21:00)</option><option value="9">亥时 (21:00-23:00)</option>
            <option value="10">子时 (23:00-01:00)</option><option value="11">丑时 (01:00-03:00)</option>
        </select>

        <button onclick="runAudit()">点击执行天命审计</button>
    </div>

    <div id="result-area">
        <div class="palace-info">
            <div class="box">命宫位置：<span id="pos-life">--</span></div>
            <div class="box">身宫位置：<span id="pos-body">--</span></div>
        </div>
        
        <div class="analysis-card">
            <h3 style="margin-top:0">🔍 专业解析报告</h3>
            <p id="analysis-text">正在分析磁场参数...</p>
        </div>

        <div id="risk-warning" class="analysis-card" style="border-color: var(--danger); display: none;">
            <h3 style="color: var(--danger); margin-top:0">⚠️ 核心风险提示</h3>
            <p id="risk-text"></p>
        </div>
    </div>
</div>

<script>
    const branches = ["寅", "卯", "辰", "巳", "午", "未", "申", "酉", "戌", "亥", "子", "丑"];

    function runAudit() {
        const month = parseInt(document.getElementById('month').value);
        const hour = parseInt(document.getElementById('hour').value);
